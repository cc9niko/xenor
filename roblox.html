<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Shop | Roblox Robux SatΡ±≈üΡ±</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4655;
            --roblox-silver: #ececed;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-dark); 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif;
            opacity: 0; 
            transition: opacity 0.6s ease-in-out; 
        }
        
        body.loaded { opacity: 1; }

        header { 
            background-color: rgba(22, 22, 22, 0.95); 
            backdrop-filter: blur(10px);
            padding: 15px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255, 70, 85, 0.2); 
            position: sticky; top: 0; z-index: 1000; 
        }
        .logo { 
            font-family: 'Orbitron', sans-serif;
            font-size: 24px; font-weight: bold; color: var(--primary); 
            text-decoration: none; letter-spacing: 3px; text-transform: uppercase; 
        }

        /* --- Hero Section --- */
        .game-hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(45deg, #2c2c2c, #000);
            border-bottom: 2px solid #333;
        }
        .game-hero h1 { font-family: 'Orbitron', sans-serif; font-size: 35px; letter-spacing: 3px; }
        .game-hero span { color: var(--roblox-silver); text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* --- Form & ID Input --- */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        
        .input-group {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
            margin-bottom: 40px;
            text-align: center;
        }
        .input-group label { display: block; margin-bottom: 15px; font-family: 'Orbitron', sans-serif; color: var(--text-dim); }
        .input-group input {
            width: 100%; max-width: 400px;
            padding: 15px;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
        }

        /* --- Price Grid --- */
        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        
        .price-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #222;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .price-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .price-card.active { border-color: var(--primary); box-shadow: 0 0 20px rgba(255, 70, 85, 0.2); }

        .robux-amount { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; display: block; margin-bottom: 10px; }
        .price-tag { color: var(--primary); font-weight: 600; font-size: 18px; }

        .buy-now-btn {
            display: block; width: 100%; max-width: 300px; margin: 50px auto;
            padding: 18px; background: var(--primary); color: #fff;
            text-decoration: none; text-align: center; border-radius: 8px;
            font-family: 'Orbitron', sans-serif; font-weight: bold;
            transition: 0.4s; box-shadow: 0 0 20px rgba(255, 70, 85, 0.3);
        }
        .buy-now-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255, 70, 85, 0.5); }

        footer { text-align: center; padding: 40px; color: #555; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Glidox</a>

            <div class="price-card" onclick="selectCard(this)">

            <div class="price-card" onclick="selectCard(this)">

            <div class="price-card" onclick="selectCard(this)">

    <footer>&copy; 2026 GLIDOX SHOP - BΟΦtΟΦn hΟΦquqlar qorunur</footer>

    <script>
        window.addEventListener("DOMContentLoaded", () => document.body.classList.add("loaded"));

        function selectCard(element) {
            document.querySelectorAll('.price-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
        }

        function order() {
            const user = document.getElementById('roblox-user').value;
            const selectedCard = document.querySelector('.price-card.active');
            
            if(!user) {

            }
            
            const amount = selectedCard.querySelector('.robux-amount').innerText;
            const price = selectedCard.querySelector('.price-tag').innerText;
            
            alert(`Sifari≈üiniz q…ôbul edildi!\nΡΑstifad…ôΟßi: ${user}\nPaket: ${amount}\nQiym…ôt: ${price}\n\nYaxΡ±n zamanda sizinl…ô …ôlaq…ô saxlanΡ±lacaq.`);
        }
    </script>
</body>
</html>
