<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xenor Shop | Ana Səhifə</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff4655;
            --bg-dark: #0a0a0a;
            --text-dim: #a0a0a0;
            --green: #00ff88;
            --admin-bg: #020204;
            --admin-panel: #0a0a0f;
            --admin-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: #ffffff; font-family: 'Poppins', sans-serif; overflow-x: hidden; opacity: 0; transition: opacity 0.8s ease-in-out; }
        body.loaded { opacity: 1; }

        /* --- USER INTERFACE STYLES --- */
        #announcement-bar { display: none; background: var(--primary); color: white; text-align: center; padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 13px; position: fixed; top: 0; width: 100%; z-index: 2000; box-shadow: 0 5px 20px rgba(255, 70, 85, 0.3); }
        header { background-color: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: fixed; top: 0; width: 100%; z-index: 1000; transition: 0.3s; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; user-select: none; }
        nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 13px; text-transform: uppercase; transition: 0.3s; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        .promo-nav-btn { background: rgba(255, 70, 85, 0.1); color: var(--primary); border: 1px solid var(--primary); padding: 8px 18px; font-family: 'Orbitron', sans-serif; font-size: 11px; cursor: pointer; border-radius: 4px; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; background: #050505; text-align: center; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 5.5rem); letter-spacing: 5px; cursor: pointer; user-select: none; }
        .hero h1 span { color: var(--primary); }

        /* --- GİZLİ ADMİN GİRİŞİ --- */
        #gatekeeper { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.98); display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .login-frame { background: var(--admin-panel); border: 1px solid var(--admin-border); padding: 40px; border-radius: 25px; width: 380px; text-align: center; }
        .login-frame input { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; outline: none; font-family: 'Orbitron'; }

        /* --- ADMİN PANEL ROOT --- */
        #titan-root { display: none; width: 100%; height: 100vh; position: fixed; inset: 0; z-index: 9999; background: var(--admin-bg); flex-direction: row; }
        aside { width: 260px; background: var(--admin-panel); border-right: 1px solid var(--admin-border); padding: 30px 15px; display: flex; flex-direction: column; }
        main.admin-content { flex: 1; overflow-y: auto; padding: 40px; background: var(--admin-bg); }
        
        .nav-link { padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; color: #555; transition: 0.3s; font-weight: 600; }
        .nav-link.active { background: var(--primary); color: #fff; box-shadow: 0 10px 20px rgba(255, 70, 85, 0.2); }
        
        .admin-glass { background: var(--admin-panel); border: 1px solid var(--admin-border); border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .admin-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--primary); color: #fff; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        .price-row { display: flex; gap: 10px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 10px; margin-bottom: 10px; align-items: center; border: 1px solid var(--admin-border); }
        .price-row input { background: #000; border: 1px solid #111; color: #fff; padding: 8px; border-radius: 5px; margin-bottom: 0; }
        
        @media (max-width: 768px) {
            #titan-root { flex-direction: column; }
            aside { width: 100%; height: auto; flex-direction: row; overflow-x: auto; }
            aside h3, .nav-link span { display: none; }
        }
    </style>
</head>
<body>

    <div id="announcement-bar">
        <i class="fa-solid fa-bullhorn"></i> <span id="ann-text-display">Yüklənir...</span>
    </div>

    <header id="main-header">
        <div class="logo" id="admin-trigger-1">Xenor</div>
        <nav>
            <ul>
                <li><a href="games.html">Oyunlar</a></li>
                <li><a href="destek.html">Dəstək</a></li>
                <li><button class="promo-nav-btn"><i class="fa-solid fa-ticket"></i> Promo</button></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1 id="admin-trigger-2">XENOR <span>SHOP</span></h1>
            <p>Azərbaycanın ən sürətli və etibarlı rəqəmsal satış platforması.</p>
            <div class="hero-btns" style="display:flex; gap:20px; justify-content:center;">
                <a href="games.html" style="padding:15px 30px; background:var(--primary); text-decoration:none; color:white; border-radius:5px; font-family:Orbitron;">Alış-verişə Başla</a>
            </div>
        </div>
    </section>

    <div id="gatekeeper">
        <div class="login-frame">
            <i class="fa-solid fa-shield-halved" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="color:#fff; font-family: 'Orbitron'; margin-bottom: 20px;">ADMİN GİRİŞİ</h2>
            <input type="email" id="f-email" placeholder="E-poçt">
            <input type="password" id="f-pass" placeholder="Şifrə">
            <button class="admin-btn" id="btn-login-trigger">DAXİL OL</button>
            <p id="auth-err" style="color:var(--primary); font-size:12px; margin-top:15px; font-weight: bold;"></p>
            <button onclick="document.getElementById('gatekeeper').style.display='none'" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Geri Qayıt</button>
        </div>
    </div>

    <div id="titan-root">
        <aside>
            <h3 style="color:var(--primary); font-family:'Orbitron'; margin-bottom:30px; padding-left:15px;">XENOR ADMİN</h3>
            <div class="nav-link active" data-target="adm-prices"><i class="fa-solid fa-tags"></i> <span>Qiymətlər</span></div>
            <div class="nav-link" data-target="adm-ann"><i class="fa-solid fa-bullhorn"></i> <span>Duyuru</span></div>
            <div id="owner-only-tab" style="display:none;">
                <div class="nav-link" data-target="adm-logs" style="color:#ffaa00;"><i class="fa-solid fa-fingerprint"></i> <span>Loqlar</span></div>
            </div>
            <button id="btn-logout" style="margin-top:auto; background:none; border:1px solid #ff4655; color:#ff4655; padding:12px; border-radius:10px; cursor:pointer;">ÇIXIŞ</button>
        </aside>

        <main class="admin-content">
            <div id="adm-prices" class="view active">
                <div class="admin-glass">
                    <h3 style="margin-bottom:20px; font-family:Orbitron;">Oyun Qiymətləri</h3>
                    <select id="game-select" style="width:100%; background:#000; color:#fff; padding:15px; border-radius:10px; border:1px solid #222;">
                        <option value="">-- Oyun Seçin (12 Oyun) --</option>
                        <option value="roblox">1. Roblox</option>
                        <option value="pubg">2. PUBG Mobile</option>
                        <option value="steambalans">3. Steam Balans</option>
                        <option value="mlbb">4. Mobile Legends</option>
                        <option value="valorant">5. Valorant</option>
                        <option value="freefire">6. Free Fire</option>
                        <option value="brawlstars">7. Brawl Stars</option>
                        <option value="clashofclans">8. Clash of Clans</option>
                        <option value="genshin">9. Genshin Impact</option>
                        <option value="efootball">10. eFootball PES</option>
                        <option value="codm">11. COD Mobile</option>
                        <option value="leagueoflegends">12. League of Legends</option>
                    </select>
                    
                    <div id="price-list-container" style="margin-top:25px;"></div>
                    
                    <div id="add-new-pkg" style="display:none; margin-top:20px; border-top:1px dashed #333; padding-top:20px;">
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="new-p-k" placeholder="Paket adı" style="flex:2; background:#000; color:#fff; border:1px solid #222; padding:10px; border-radius:8px;">
                            <input type="text" id="new-p-v" placeholder="Qiymət" style="flex:1; background:#000; color:#fff; border:1px solid #222; padding:10px; border-radius:8px;">
                        </div>
                        <button class="admin-btn" id="btn-save-prices" style="margin-top:15px;">DƏYİŞİKLİKLƏRİ YADDA SAXLA</button>
                    </div>
                </div>
            </div>

            <div id="adm-ann" class="view" style="display:none;">
                <div class="admin-glass">
                    <h3 style="margin-bottom:20px; font-family:Orbitron;">Duyuru Mesajı</h3>
                    <textarea id="ann-input" style="width:100%; height:150px; background:#000; color:#fff; border:1px solid #222; border-radius:10px; padding:15px; outline:none;"></textarea>
                    <button class="admin-btn" id="btn-save-ann" style="margin-top:15px;">YAYIMLA</button>
                </div>
            </div>

            <div id="adm-logs" class="view" style="display:none;">
                <div class="admin-glass">
                    <h3 style="margin-bottom:20px; font-family:Orbitron;">Təhlükəsizlik Loqları</h3>
                    <div id="logs-display" style="height:500px; overflow-y:auto; background:#000; padding:15px; border-radius:10px; font-family:monospace; font-size:12px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "glidoxshop" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        setPersistence(auth, browserLocalPersistence);

        const OWNER_UID = "dXDTZPPuVKaO1ecsO7UbCOXr15i1";
        const ADMINS = ["tMaqCC1AdoWUYgGTuay2eFKYMOF2", "NaH17on6YEO3bJzWXY16SZ02xtJ2", "Yr5c1JF2Z3T3amIoV3OJanFnFCR2"];
        let userIp = ""; fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => userIp = d.ip);

        // --- GİZLİ TETİKLEYİCİ ---
        const triggers = ['admin-trigger-1', 'admin-trigger-2'];
        let pressTimer;
        triggers.forEach(id => {
            const el = document.getElementById(id);
            if(!el) return;
            el.onmousedown = el.ontouchstart = () => {
                pressTimer = setTimeout(() => {
                    const code = prompt("Təhlükəsizlik Kodu:");
                    if(code === "1991") document.getElementById('gatekeeper').style.display = 'flex';
                }, 3000);
            };
            el.onmouseup = el.ontouchend = () => clearTimeout(pressTimer);
        });

        // --- AUTH DURUMU ---
        onAuthStateChanged(auth, (user) => {
            if (user && (user.uid === OWNER_UID || ADMINS.includes(user.uid))) {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('titan-root').style.display = 'flex';
                document.body.style.overflow = 'hidden';
                if(user.uid === OWNER_UID) {
                    document.getElementById('owner-only-tab').style.display = 'block';
                    loadLogs();
                }
                initAdminLogic();
            } else {
                document.getElementById('titan-root').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        });

        // --- ADMİN FUNKSİYALARI ---
        function initAdminLogic() {
            const container = document.getElementById('price-list-container');
            const gameSelect = document.getElementById('game-select');

            gameSelect.onchange = (e) => {
                const game = e.target.value;
                if(!game) return container.innerHTML = "";
                document.getElementById('add-new-pkg').style.display = "block";
                
                onValue(ref(db, `prices/${game}`), (snap) => {
                    container.innerHTML = "";
                    const data = snap.val();
                    if(data) {
                        Object.keys(data).forEach(k => {
                            const div = document.createElement('div');
                            div.className = 'price-row';
                            div.innerHTML = `<input type="text" value="${k}" readonly style="flex:2"> <input type="text" class="v-input" value="${data[k]}" style="flex:1"> <button class="del-btn" style="background:none; border:none; color:red; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>`;
                            div.querySelector('.del-btn').onclick = () => div.remove();
                            container.appendChild(div);
                        });
                    }
                }, {onlyOnce: true});
            };

            document.getElementById('btn-save-prices').onclick = async () => {
                const game = gameSelect.value;
                let updateData = {};
                container.querySelectorAll('.price-row').forEach(row => {
                    const k = row.querySelector('input[readonly]').value;
                    const v = row.querySelector('.v-input').value;
                    updateData[k] = v;
                });
                
                const nk = document.getElementById('new-p-k').value;
                const nv = document.getElementById('new-p-v').value;
                if(nk && nv) updateData[nk] = nv;

                await set(ref(db, `prices/${game}`), updateData);
                await push(ref(db, 'logs'), { user: auth.currentUser.email, action: `${game} qiymətlərini yenilədi`, ip: userIp, time: new Date().toLocaleString() });
                alert("Yadda saxlanıldı!");
                document.getElementById('new-p-k').value = ""; document.getElementById('new-p-v').value = "";
            };

            document.getElementById('btn-save-ann').onclick = async () => {
                const msg = document.getElementById('ann-input').value;
                await set(ref(db, 'announcement'), { message: msg, time: new Date().toLocaleString() });
                alert("Duyuru yayımlandı!");
            };
        }

        function loadLogs() {
            onValue(ref(db, 'logs'), (snap) => {
                const logBox = document.getElementById('logs-display');
                logBox.innerHTML = "";
                let logs = [];
                snap.forEach(c => { logs.push(c.val()); });
                logs.reverse().forEach(l => {
                    logBox.innerHTML += `<div style="border-bottom:1px solid #111; padding:5px;"><span style="color:var(--primary)">[${l.time}]</span> <b>${l.user}</b>: ${l.action} (${l.ip})</div>`;
                });
            });
        }

        // Giriş/Çıxış/Nav
        document.getElementById('btn-login-trigger').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('f-email').value, document.getElementById('f-pass').value)
            .catch(() => document.getElementById('auth-err').innerText = "Giriş rədd edildi!");
        };
        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
        document.querySelectorAll('.nav-link').forEach(n => {
            n.onclick = () => {
                document.querySelectorAll('.nav-link, .view').forEach(x => { x.classList.remove('active'); x.style.display = "none"; });
                n.classList.add('active'); n.style.display = "flex";
                const target = document.getElementById(n.dataset.target);
                target.classList.add('active'); target.style.display = "block";
            };
        });

        // USER ANNOUNCEMENT
        onValue(ref(db, 'announcement'), (snap) => {
            const data = snap.val();
            if (data?.message) {
                document.getElementById('announcement-bar').style.display = "block";
                document.getElementById('ann-text-display').innerText = data.message;
                document.getElementById('main-header').style.top = "42px";
            }
        });

        window.addEventListener("DOMContentLoaded", () => document.body.classList.add("loaded"));
    </script>
</body>
</html>
