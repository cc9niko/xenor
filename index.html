<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Shop | Ana Səhifə</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4655;
            --bg-dark: #0a0a0a;
            --text-dim: #a0a0a0;
            --green: #00ff88;
        }

        /* --- ƏVVƏLKİ STİLLƏR --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: #ffffff; font-family: 'Poppins', sans-serif; overflow-x: hidden; opacity: 0; transition: opacity 0.8s ease-in-out; }
        body.loaded { opacity: 1; }

        #announcement-bar { display: none; background: var(--primary); color: white; text-align: center; padding: 12px; font-family: 'Orbitron', sans-serif; font-size: 14px; position: fixed; top: 0; width: 100%; z-index: 2000; box-shadow: 0 5px 20px rgba(255, 70, 85, 0.4); letter-spacing: 1px; }

        header { background-color: rgba(22, 22, 22, 0.95); backdrop-filter: blur(10px); padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 70, 85, 0.2); position: fixed; top: 0; width: 100%; z-index: 1000; transition: top 0.3s ease; }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; letter-spacing: 3px; text-transform: uppercase; }
        nav { display: flex; align-items: center; gap: 30px; }
        nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 14px; text-transform: uppercase; transition: 0.3s; font-family: 'Orbitron', sans-serif; }
        nav ul li a:hover { color: var(--primary); }

        /* PROMO DÜYMƏSİ SİZİN İSTƏDİYİNİZ YERDƏ */
        .promo-nav-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .promo-nav-btn:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(255, 70, 85, 0.4);
        }

        /* MODAL (PƏNCƏRƏ) STİLLƏRİ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 3000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid var(--primary);
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }
        .modal-content h3 { font-family: 'Orbitron'; margin-bottom: 20px; color: var(--primary); }
        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: white;
            margin-bottom: 15px;
            text-align: center;
            font-family: 'Orbitron';
        }
        .modal-content .check-btn {
            width: 100%;
            padding: 12px;
            background: var(--green);
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron';
            transition: 0.3s;
        }
        .modal-content .check-btn:hover { opacity: 0.8; }
        .close-modal {
            position: absolute;
            top: 10px; right: 10px;
            background: none; border: none;
            color: #555; font-size: 20px; cursor: pointer;
        }

        /* HERO VƏ DİGƏR STİLLƏR */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; background: #050505; overflow: hidden; text-align: center; }
        .hero::before { content: ''; position: absolute; width: 150%; height: 150%; background: radial-gradient(circle at center, rgba(255, 70, 85, 0.15) 0%, transparent 50%); animation: flow 10s infinite alternate; z-index: 1; }
        @keyframes flow { 0% { transform: translate(-5%, -5%) rotate(0deg); } 100% { transform: translate(5%, 5%) rotate(3deg); } }
        .hero-content { position: relative; z-index: 10; max-width: 850px; padding: 20px; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(3rem, 10vw, 6rem); letter-spacing: 8px; margin-bottom: 25px; text-transform: uppercase; }
        .hero h1 span { background: linear-gradient(90deg, #ff4655, #f2a900); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(255, 70, 85, 0.4)); }
        .hero p { color: var(--text-dim); font-size: 1.2rem; margin-bottom: 50px; letter-spacing: 1px; }
        .hero-btns { display: flex; gap: 25px; justify-content: center; }
        .main-btn { padding: 18px 45px; background: var(--primary); color: #fff; text-decoration: none; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 5px; transition: 0.4s; box-shadow: 0 0 25px rgba(255, 70, 85, 0.4); text-transform: uppercase; letter-spacing: 2px; }
        .main-btn:hover { background: transparent; color: var(--primary); border: 1px solid var(--primary); transform: translateY(-5px); box-shadow: 0 0 40px rgba(255, 70, 85, 0.6); }
        .secondary-btn { padding: 18px 45px; background: transparent; color: #fff; text-decoration: none; font-family: 'Orbitron', sans-serif; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 5px; transition: 0.4s; text-transform: uppercase; letter-spacing: 2px; }
        .hero-bottom-glow { position: absolute; bottom: 0; width: 100%; height: 150px; background: linear-gradient(to top, var(--bg-dark), transparent); z-index: 5; }
    </style>
</head>
<body>

    <div id="announcement-bar">
        📢 <span id="ann-text-display"></span>
    </div>

    <header id="main-header">
        <a href="index.html" class="logo">Glidox</a>
        <nav>
            <ul>
                <li><a href="games.html">Oyunlar</a></li>
                <li><a href="destek.html">Dəstək</a></li>
                <li><button class="promo-nav-btn" onclick="openPromo()">🎟️ Promo Kod</button></li>
            </ul>
        </nav>
    </header>

    <div class="modal-overlay" id="promo-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closePromo()">×</button>
            <h3>PROMO KOD</h3>
            <p style="font-size: 12px; color: #777; margin-bottom: 15px;">Xüsusi endirimlərdən yararlanmaq üçün kodu daxil edin.</p>
            <input type="text" id="promo-input" placeholder="KODU BURAYA YAZIN">
            <button class="check-btn" id="check-promo-btn">YOXLA</button>
            <div id="promo-result" style="margin-top: 15px; font-size: 13px;"></div>
        </div>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1>GLIDOX <span>SHOP</span></h1>
            <p>Azərbaycanın ən sürətli və etibarlı oyunçu platforması. Eksklüziv imkanlar sizi gözləyir.</p>
            <div class="hero-btns">
                <a href="games.html" class="main-btn">Oyunları Gör</a>
                <a href="destek.html" class="secondary-btn">Dəstək Al</a>
            </div>
        </div>
        <div class="hero-bottom-glow"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8",
            authDomain: "glidoxshop.firebaseapp.com",
            projectId: "glidoxshop",
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            appId: "1:123258254071:web:ae147159986886134a59f2"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // --- MODAL FUNKSİYALARI ---
        window.openPromo = () => document.getElementById('promo-modal').style.display = 'flex';
        window.closePromo = () => {
            document.getElementById('promo-modal').style.display = 'none';
            document.getElementById('promo-result').innerText = "";
        };

        // --- PROMO KODU YOXLA ---
        document.getElementById('check-promo-btn').addEventListener('click', async () => {
            const code = document.getElementById('promo-input').value.trim();
            const resultDiv = document.getElementById('promo-result');
            
            if(!code) return;

            resultDiv.innerHTML = "Yoxlanılır...";
            
            const promoRef = ref(database, 'promocodes/' + code);
            const snapshot = await get(promoRef);

            if (snapshot.exists()) {
                const data = snapshot.val();
                if(data.status === "active" && data.used < data.limit) {
                    resultDiv.style.color = "var(--green)";
                    resultDiv.innerHTML = `✅ TƏBRİKLƏR! <b>${data.percent}%</b> endirim qazandınız.`;
                    localStorage.setItem('glidox_promo', JSON.stringify({code: code, percent: data.percent}));
                } else {
                    resultDiv.style.color = "var(--primary)";
                    resultDiv.innerHTML = "❌ Bu kodun vaxtı bitib və ya limiti dolub.";
                }
            } else {
                resultDiv.style.color = "var(--primary)";
                resultDiv.innerHTML = "❌ Belə bir promo kod mövcud deyil.";
            }
        });

        // --- DUYURU SİSTEMİ ---
        const annBar = document.getElementById('announcement-bar');
        const annText = document.getElementById('ann-text-display');
        const header = document.getElementById('main-header');

        onValue(ref(database, 'announcement'), (snap) => {
            const data = snap.val();
            if (data && data.status === "active" && data.text !== "") {
                annBar.style.display = "block";
                annText.innerText = data.text;
                header.style.top = annBar.offsetHeight + "px";
            } else {
                annBar.style.display = "none";
                header.style.top = "0";
            }
        });

        window.addEventListener("DOMContentLoaded", () => {
            document.body.classList.add("loaded");
        });
    </script>
</body>
</html>
