<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Shop | Ana Səhifə</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #ff4655;
            --bg-dark: #0a0a0a;
            --text-dim: #a0a0a0;
            --green: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: #ffffff; font-family: 'Poppins', sans-serif; overflow-x: hidden; opacity: 0; transition: opacity 0.8s ease-in-out; }
        body.loaded { opacity: 1; }

        /* DUYURU BAR */
        #announcement-bar { 
            display: none; 
            background: var(--primary); 
            color: white; 
            text-align: center; 
            padding: 12px; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 13px; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 2000; 
            box-shadow: 0 5px 20px rgba(255, 70, 85, 0.3); 
        }

        header { 
            background-color: rgba(10, 10, 10, 0.9); 
            backdrop-filter: blur(15px); 
            padding: 20px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000; 
            transition: 0.3s; 
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; color: var(--primary); text-decoration: none; letter-spacing: 3px; text-transform: uppercase; }
        
        nav ul { list-style: none; display: flex; gap: 30px; align-items: center; }
        nav ul li a { color: #fff; text-decoration: none; font-size: 13px; text-transform: uppercase; transition: 0.3s; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
        nav ul li a:hover { color: var(--primary); }

        .promo-nav-btn {
            background: rgba(255, 70, 85, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .promo-nav-btn:hover { background: var(--primary); color: white; box-shadow: 0 0 15px rgba(255, 70, 85, 0.4); }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #0f0f0f;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 70, 85, 0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }
        .modal-content h3 { font-family: 'Orbitron'; margin-bottom: 20px; color: #fff; letter-spacing: 2px; }
        .modal-content input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #222;
            color: var(--primary);
            margin-bottom: 20px;
            text-align: center;
            font-family: 'Orbitron';
            border-radius: 8px;
            font-size: 16px;
        }
        .check-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron';
            transition: 0.3s;
            border-radius: 8px;
            letter-spacing: 1px;
        }
        .check-btn:hover { filter: brightness(1.2); }
        .close-modal { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #555; font-size: 24px; cursor: pointer; }

        /* HERO */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; background: #050505; overflow: hidden; text-align: center; }
        .hero-content { position: relative; z-index: 10; max-width: 900px; padding: 20px; }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 5.5rem); letter-spacing: 5px; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary); filter: drop-shadow(0 0 15px rgba(255, 70, 85, 0.5)); }
        .hero p { color: var(--text-dim); font-size: clamp(0.9rem, 2vw, 1.1rem); margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.6; }
        
        .hero-btns { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .main-btn { padding: 18px 40px; background: var(--primary); color: #fff; text-decoration: none; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 5px; transition: 0.4s; box-shadow: 0 0 20px rgba(255, 70, 85, 0.3); text-transform: uppercase; font-size: 14px; }
        .main-btn:hover { transform: translateY(-5px); box-shadow: 0 0 30px rgba(255, 70, 85, 0.5); }
        .secondary-btn { padding: 18px 40px; background: transparent; color: #fff; text-decoration: none; font-family: 'Orbitron', sans-serif; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 5px; transition: 0.4s; text-transform: uppercase; font-size: 14px; }
        .secondary-btn:hover { background: rgba(255,255,255,0.05); border-color: white; }
    </style>
</head>
<body>

    <div id="announcement-bar">
        <i class="fa-solid fa-bullhorn"></i> <span id="ann-text-display">Yüklənir...</span>
    </div>

    <header id="main-header">
        <a href="index.html" class="logo">Glidox</a>
        <nav>
            <ul>
                <li><a href="games.html">Oyunlar</a></li>
                <li><a href="destek.html">Dəstək</a></li>
                <li><button class="promo-nav-btn" onclick="openPromo()"><i class="fa-solid fa-ticket"></i> Promo</button></li>
            </ul>
        </nav>
    </header>

    <div class="modal-overlay" id="promo-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closePromo()">×</button>
            <h3>PROMO KOD</h3>
            <p style="font-size: 12px; color: #777; margin-bottom: 20px;">Kodu daxil edərək endirim qazanın.</p>
            <input type="text" id="promo-input" placeholder="Məs: GLIDOX2026">
            <button class="check-btn" id="check-promo-btn">YOXLA</button>
            <div id="promo-result" style="margin-top: 15px; font-size: 14px; font-weight: bold;"></div>
        </div>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1>GLIDOX <span>SHOP</span></h1>
            <p>Azərbaycanın ən sürətli və etibarlı rəqəmsal satış platforması. Sevdiyiniz oyunlar üçün ən ucuz qiymətlər buradadır.</p>
            <div class="hero-btns">
                <a href="games.html" class="main-btn">Alış-verişə Başla</a>
                <a href="destek.html" class="secondary-btn">Dəstək Al</a>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", // Düzəldildi
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // MODAL İDARƏETMƏSİ
        window.openPromo = () => {
            document.getElementById('promo-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };
        window.closePromo = () => {
            document.getElementById('promo-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('promo-result').innerText = "";
            document.getElementById('promo-input').value = "";
        };

        // PROMO KOD SİSTEMİ
        document.getElementById('check-promo-btn').addEventListener('click', async () => {
            const code = document.getElementById('promo-input').value.trim().toUpperCase();
            const resultDiv = document.getElementById('promo-result');
            
            if(!code) return;

            resultDiv.style.color = "#aaa";
            resultDiv.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Yoxlanılır...";
            
            try {
                const promoRef = ref(database, 'promocodes/' + code);
                const snapshot = await get(promoRef);

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    // Admin tərəfindən status "active" olmalıdır
                    if(data.status === "active") {
                        resultDiv.style.color = "var(--green)";
                        resultDiv.innerHTML = `✅ ENDİRİM: ${data.percent}% QAZANDINIZ!`;
                        localStorage.setItem('glidox_promo', JSON.stringify({code: code, percent: data.percent}));
                    } else {
                        resultDiv.style.color = "var(--primary)";
                        resultDiv.innerHTML = "❌ Bu kod artıq aktiv deyil.";
                    }
                } else {
                    resultDiv.style.color = "var(--primary)";
                    resultDiv.innerHTML = "❌ Belə bir kod tapılmadı.";
                }
            } catch (err) {
                resultDiv.innerHTML = "Sistem xətası.";
            }
        });

        // DUYURU (ANNOUNCEMENT) SİSTEMİ
        const annBar = document.getElementById('announcement-bar');
        const annText = document.getElementById('ann-text-display');
        const header = document.getElementById('main-header');

        onValue(ref(database, 'announcement'), (snap) => {
            const data = snap.val();
            // Admin panelindən gələn dataya uyğun (message və ya text)
            const message = data?.message || data?.text;
            
            if (message && message.trim() !== "") {
                annBar.style.display = "block";
                annText.innerText = message;
                header.style.top = annBar.offsetHeight + "px";
            } else {
                annBar.style.display = "none";
                header.style.top = "0";
            }
        });

        // Səhifə Yüklənmə Effekti
        window.addEventListener("DOMContentLoaded", () => {
            document.body.classList.add("loaded");
        });
    </script>
</body>
</html>
