<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Shop | Ana Səhifə</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4655;
            --bg-dark: #0a0a0a;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-dark); 
            color: #ffffff; 
            font-family: 'Poppins', sans-serif;
            overflow: hidden; 
            opacity: 0; 
            transition: opacity 0.8s ease-in-out; 
        }
        
        body.loaded { opacity: 1; }

        header { 
            background-color: rgba(22, 22, 22, 0.95); 
            backdrop-filter: blur(10px);
            padding: 20px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(255, 70, 85, 0.2); 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
        }
        .logo { 
            font-family: 'Orbitron', sans-serif;
            font-size: 24px; font-weight: bold; color: var(--primary); 
            text-decoration: none; letter-spacing: 3px; text-transform: uppercase; 
        }
        nav ul { list-style: none; display: flex; gap: 30px; }
        nav ul li a { 
            color: #fff; text-decoration: none; font-size: 14px; 
            text-transform: uppercase; transition: 0.3s; font-family: 'Orbitron', sans-serif; 
        }
        nav ul li a:hover { color: var(--primary); }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #050505;
            overflow: hidden;
            text-align: center;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 150%; height: 150%;
            background: radial-gradient(circle at center, rgba(255, 70, 85, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 20% 30%, rgba(242, 169, 0, 0.1) 0%, transparent 40%);
            animation: flow 10s infinite alternate;
            z-index: 1;
        }

        @keyframes flow {
            0% { transform: translate(-5%, -5%) rotate(0deg); }
            100% { transform: translate(5%, 5%) rotate(3deg); }
        }

        .hero-content { position: relative; z-index: 10; max-width: 850px; padding: 20px; }

        .hero h1 { 
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem); 
            letter-spacing: 8px;
            margin-bottom: 25px; 
            text-transform: uppercase;
        }
        .hero h1 span { 
            background: linear-gradient(90deg, #ff4655, #f2a900);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 70, 85, 0.4));
        }
        .hero p { color: var(--text-dim); font-size: 1.2rem; margin-bottom: 50px; letter-spacing: 1px; }

        .hero-btns { display: flex; gap: 25px; justify-content: center; }
        
        .main-btn {
            padding: 18px 45px; background: var(--primary); color: #fff;
            text-decoration: none; font-family: 'Orbitron', sans-serif;
            font-weight: bold; border-radius: 5px; transition: 0.4s;
            box-shadow: 0 0 25px rgba(255, 70, 85, 0.4);
            text-transform: uppercase; letter-spacing: 2px;
        }
        .main-btn:hover { 
            background: transparent; color: var(--primary); 
            border: 1px solid var(--primary); transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(255, 70, 85, 0.6);
        }

        .secondary-btn {
            padding: 18px 45px; background: transparent; color: #fff;
            text-decoration: none; font-family: 'Orbitron', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px; transition: 0.4s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .secondary-btn:hover { border-color: #fff; background: rgba(255, 255, 255, 0.05); }

        .hero-bottom-glow {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
            z-index: 5;
        }

        @media (max-width: 768px) {
            .hero-btns { flex-direction: column; }
            header { padding: 15px 5%; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Glidox</a>
        <nav>
            <ul>
                <li><a href="games.html">Oyunlar</a></li>
                <li><a href="destek.html">Dəstək</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>GLIDOX <span>SHOP</span></h1>
            <p>Azərbaycanın ən sürətli və etibarlı oyunçu platforması. Eksklüziv imkanlar sizi gözləyir.</p>
            <div class="hero-btns">
                <a href="games.html" class="main-btn">Oyunları Gör</a>
                <a href="destek.html" class="secondary-btn">Dəstək Al</a>
            </div>
        </div>
        <div class="hero-bottom-glow"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
        import { getDatabase } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8",
            authDomain: "glidoxshop.firebaseapp.com",
            projectId: "glidoxshop",
            storageBucket: "glidoxshop.firebasestorage.app",
            messagingSenderId: "123258254071",
            appId: "1:123258254071:web:ae147159986886134a59f2",
            measurementId: "G-TT462T34YL"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const database = getDatabase(app);

        // Sayt yüklənəndə animasiyanı aktiv et
        window.addEventListener("DOMContentLoaded", () => {
            document.body.classList.add("loaded");
        });
    </script>
</body>
</html>
