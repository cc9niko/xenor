<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox | Pro Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #ff4655; --bg: #050505; --card: #111; --text: #eee; --green: #00ff88; --accent: #222; --blue: #0088ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: #0a0a0a; border-right: 1px solid var(--accent); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .logo { font-family: 'Orbitron'; color: var(--primary); font-size: 18px; margin-bottom: 30px; text-align: center; border: 1px solid var(--primary); padding: 10px; }
        .nav-group { margin-bottom: 20px; }
        .nav-label { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; display: block; font-family: 'Orbitron'; }
        .nav-btn { 
            width: 100%; padding: 10px 15px; background: transparent; border: none; color: #888; 
            text-align: left; cursor: pointer; border-radius: 6px; font-size: 13px; transition: 0.3s; margin-bottom: 4px;
        }
        .nav-btn:hover, .nav-btn.active { background: rgba(255, 70, 85, 0.1); color: var(--primary); }

        .workspace { flex: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at top right, #0d0d0d, #050505); }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border-left: 4px solid var(--primary); padding: 20px; border-radius: 8px; position: relative; }
        .stat-card h4 { font-size: 11px; color: #666; text-transform: uppercase; }
        .stat-card .val { font-size: 24px; font-family: 'Orbitron'; margin-top: 10px; }

        .catalog-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; padding: 15px; background: #0f0f0f; border-radius: 10px; }
        .cat-btn { padding: 8px 12px; background: #1a1a1a; border: 1px solid var(--accent); color: #fff; cursor: pointer; border-radius: 4px; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .cat-btn.active { background: var(--primary); border-color: var(--primary); }

        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--accent); padding: 10px; color: #fff; border-radius: 5px; margin-top: 5px; }
        .btn-save { background: var(--green); color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-save:hover { opacity: 0.8; }
        
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        .admin-table th { background: #1a1a1a; padding: 12px; text-align: left; color: var(--primary); font-family: 'Orbitron'; font-size: 10px; }
        .admin-table td { padding: 12px; border-bottom: 1px solid var(--accent); background: #0c0c0c; }
        
        .promo-status { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">GLIDOX ADMIN v2.5</div>
        
        <div class="nav-group">
            <span class="nav-label">Əsas</span>
            <button class="nav-btn active" onclick="nav('dashboard')">📊 Dashboard</button>
            <button class="nav-btn" onclick="nav('products')">💎 Qiymət & Kataloq</button>
        </div>

        <div class="nav-group">
            <span class="nav-label">Marketinq</span>
            <button class="nav-btn" onclick="nav('promo')">🎟️ Promo Kodlar</button>
            <button class="nav-btn" onclick="nav('announcement')">📢 Duyurular</button>
        </div>

        <div class="nav-group">
            <span class="nav-label">Sistem</span>
            <button class="nav-btn" onclick="nav('blacklist')">🚫 Qara Siyahı</button>
        </div>
    </aside>

    <main class="workspace">
        
        <section id="dashboard" class="section active">
            <h2 style="font-family:'Orbitron'; margin-bottom:20px;">Ümumi Baxış</h2>
            <div class="grid-stats">
                <div class="stat-card"><h4>Gündəlik Satış</h4><div class="val" id="dash-sales">0 AZN</div></div>
                <div class="stat-card" style="border-left-color: var(--green)"><h4>Xalis Qazanc</h4><div class="val">0 AZN</div></div>
                <div class="stat-card"><h4>Ziyarətçilər</h4><div class="val">128</div></div>
            </div>
            <div style="background:var(--card); padding:20px; border-radius:10px;">
                <canvas id="salesChart" height="100"></canvas>
            </div>
        </section>

        <section id="products" class="section">
            <h2 style="font-family:'Orbitron'; margin-bottom:15px;">Kataloq & Qiymətlər</h2>
            <div class="catalog-selector" id="cat-list"></div>
            <div id="product-editor" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:15px;">
                <p style="color:#555">Zəhmət olmasa yuxarıdan bir oyun seçin...</p>
            </div>
        </section>

        <section id="promo" class="section">
            <h2 style="font-family:'Orbitron';">🎟️ Promo Kod Sistemi</h2>
            <div class="stat-card" style="margin-top:15px; max-width: 500px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" id="promo-name" placeholder="Kod adı">
                    <input type="number" id="promo-percent" placeholder="Endirim %">
                    <input type="number" id="promo-limit" placeholder="Limit">
                    <select id="promo-init-status">
                        <option value="active">Aktiv Başlat</option>
                        <option value="inactive">Deaktiv Başlat</option>
                    </select>
                </div>
                <button class="btn-save" onclick="createPromo()">Kuponu Yarat</button>
            </div>

            <table class="admin-table" style="margin-top:20px;">
                <thead><tr><th>KOD</th><th>FAİZ</th><th>LİMİT</th><th>İŞLƏNİB</th><th>STATUS</th><th>SİL</th></tr></thead>
                <tbody id="promo-list-body"></tbody>
            </table>
        </section>

        <section id="blacklist" class="section">
            <h2 style="font-family:'Orbitron'; color:var(--primary);">🚫 Blacklist</h2>
            <div style="display:flex; gap:10px; margin-top:10px; max-width: 500px;">
                <input type="text" id="bl-input" placeholder="IP və ya Oyun ID-si">
                <button class="btn-save" style="background:red; width:150px; margin-top:5px;" onclick="addToBlacklist()">BLOKLA</button>
            </div>
            <table class="admin-table">
                <thead><tr><th>Data</th><th>Tarix</th><th>Sil</th></tr></thead>
                <tbody id="bl-list"></tbody>
            </table>
        </section>

        <section id="announcement" class="section">
            <h2 style="font-family:'Orbitron';">📢 Sayt Duyurusu</h2>
            <div style="max-width: 600px; margin-top:15px;">
                <textarea id="ann-text" style="height: 100px;" placeholder="Duyuru mətni..."></textarea>
                <select id="ann-status" style="margin-top:10px;">
                    <option value="active">Aktiv</option>
                    <option value="inactive">Deaktiv</option>
                </select>
                <button class="btn-save" onclick="saveAnn()">Yadda Saxla</button>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop",
            appId: "1:123258254071:web:ae147159986886134a59f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const cats = ["roblox", "pubg", "steambalans", "mlbb", "valorantTR", "valorantEU", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        window.nav = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(event) event.target.classList.add('active');
        };

        function initCats() {
            const container = document.getElementById('cat-list');
            container.innerHTML = cats.map(c => `<button class="cat-btn" onclick="loadPrices('${c}', this)">${c}</button>`).join('');
        }

        window.loadPrices = (game, btn) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            onValue(ref(db, 'prices/' + game), (snap) => {
                const editor = document.getElementById('product-editor');
                editor.innerHTML = "";
                const data = snap.val() || {};
                Object.keys(data).forEach(key => {
                    editor.innerHTML += `
                        <div class="stat-card">
                            <h4 style="color:var(--primary)">${key.replace(/_/g,' ')}</h4>
                            <input type="text" id="inp-${game}-${key}" value="${data[key]}">
                            <div style="display:flex; gap:5px;">
                                <button class="btn-save" style="font-size:10px" onclick="updatePrice('${game}','${key}')">Yadda Saxla</button>
                                <button class="btn-save" style="background:#333; color:white; font-size:10px; width:50px;" onclick="deletePackage('${game}','${key}')">🗑️</button>
                            </div>
                        </div>`;
                });
                editor.innerHTML += `<div class="stat-card" style="border:1px dashed #444; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#555" onclick="addNewPackage('${game}')">+ Yeni Paket</div>`;
            });
        };

        window.updatePrice = (game, key) => {
            const val = document.getElementById(`inp-${game}-${key}`).value;
            set(ref(db, `prices/${game}/${key}`), val).then(() => alert("Yeniləndi!"));
        };

        window.deletePackage = (game, key) => {
            if(confirm("Silinsin?")) remove(ref(db, `prices/${game}/${key}`));
        };

        window.addNewPackage = (game) => {
            const name = prompt("Paket adı:"); const price = prompt("Qiymət:");
            if(name && price) set(ref(db, `prices/${game}/${name.replace(/ /g,'_')}`), price);
        };

        window.createPromo = () => {
            const name = document.getElementById('promo-name').value.trim();
            const percent = parseInt(document.getElementById('promo-percent').value);
            const limit = parseInt(document.getElementById('promo-limit').value);
            const status = document.getElementById('promo-init-status').value;
            if(name && percent) {
                set(ref(db, 'promocodes/' + name), { percent, limit, used: 0, status }).then(() => alert("Kupon yaradıldı!"));
            }
        };

        window.togglePromo = (code, cur) => {
            update(ref(db, 'promocodes/' + code), { status: cur === 'active' ? 'inactive' : 'active' });
        };

        onValue(ref(db, 'promocodes'), (snap) => {
            const body = document.getElementById('promo-list-body');
            body.innerHTML = "";
            snap.forEach(child => {
                const p = child.val();
                const color = p.status === 'active' ? 'var(--green)' : '#555';
                body.innerHTML += `<tr>
                    <td>${child.key}</td><td>${p.percent}%</td><td>${p.limit}</td><td>${p.used}</td>
                    <td><button class="promo-status" style="background:${color}" onclick="togglePromo('${child.key}','${p.status}')">${p.status.toUpperCase()}</button></td>
                    <td><button onclick="remove(ref(db,'promocodes/${child.key}'))">❌</button></td>
                </tr>`;
            });
        });

        window.saveAnn = () => {
            set(ref(db, 'announcement'), { text: document.getElementById('ann-text').value, status: document.getElementById('ann-status').value }).then(() => alert("Duyuru yeniləndi!"));
        };

        window.addToBlacklist = () => {
            const val = document.getElementById('bl-input').value;
            if(val) push(ref(db, 'blacklist'), { data: val, date: new Date().toLocaleString() });
        };

        onValue(ref(db, 'blacklist'), snap => {
            const list = document.getElementById('bl-list');
            list.innerHTML = "";
            snap.forEach(c => {
                list.innerHTML += `<tr><td>${c.val().data}</td><td>${c.val().date}</td><td><button onclick="remove(ref(db,'blacklist/${c.key}'))">❌</button></td></tr>`;
            });
        });

        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['B.e', 'Ç.a', 'Ç', 'C.a', 'C', 'Ş', 'B'],
                datasets: [{ label: 'Satış (AZN)', data: [0, 0, 0, 0, 0, 0, 0], borderColor: '#ff4655', tension: 0.4 }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        initCats();
        loadPrices('roblox', null);
    </script>
</body>
</html>
