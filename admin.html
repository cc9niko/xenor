<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #ff4655; --bg: #050505; --card: #111; --text: #eee; 
            --green: #00ff88; --accent: #222; --gold: #ffd700; --blue: #0088ff; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Mobil menyu düyməsi (yalnız mobildə görünür) */
        .menu-toggle { display: none; position: fixed; top: 15px; right: 15px; z-index: 1001; background: var(--primary); border: none; color: white; padding: 10px; border-radius: 5px; cursor: pointer; }

        /* Sidebar Responsive */
        .sidebar { 
            width: 260px; background: #080808; border-right: 1px solid var(--accent); padding: 20px; 
            display: flex; flex-direction: column; transition: 0.3s; z-index: 1000;
        }

        /* Giriş Ekranı */
        #auth-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); padding: 20px; }
        .auth-box { background: #0a0a0a; padding: 30px; border: 1px solid var(--accent); border-radius: 15px; text-align: center; width: 100%; max-width: 380px; }
        
        .role-badge { font-family: 'Orbitron'; font-size: 10px; padding: 6px; border-radius: 4px; margin-bottom: 20px; text-align: center; width: 100%; display: block; }
        .admin-badge { background: rgba(255, 70, 85, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .owner-badge { background: rgba(255, 215, 0, 0.1); color: var(--gold); border: 1px solid var(--gold); }

        .nav-group { margin-bottom: 20px; }
        .nav-btn { 
            width: 100%; padding: 12px 15px; background: transparent; border: none; color: #777; 
            text-align: left; cursor: pointer; border-radius: 8px; font-size: 13px; margin-bottom: 5px; transition: 0.2s;
        }
        .nav-btn:hover, .nav-btn.active { background: #1a1a1a; color: #fff; }
        .nav-btn.active { border-left: 3px solid var(--primary); }
        .owner-only { display: none !important; }

        .workspace { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .section { display: none; }
        .section.active { display: block; }

        /* Kartlar */
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid var(--accent); }
        .stat-val { font-family: 'Orbitron'; font-size: 18px; margin-top: 5px; }

        /* Formalar */
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 12px; color: #fff; border-radius: 8px; margin-bottom: 10px; outline: none; font-size: 14px; }
        .btn-main { background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; width: 100%; }

        /* Mobil üçün media query */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { position: fixed; left: -260px; height: 100%; }
            .sidebar.open { left: 0; }
            .workspace { padding: 60px 15px 20px; }
            .grid-stats { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="font-family:'Orbitron'; margin-bottom:20px; color:var(--primary)">CORE ACCESS</h2>
            <input type="password" id="pass-key" placeholder="Şifrəni daxil edin..." style="text-align:center;">
            <button class="btn-main" onclick="tryLogin()">SİSTEMİ AÇ</button>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <div id="role-display" class="role-badge admin-badge">YÜKLƏNİR...</div>
        
        <div class="nav-group">
            <button class="nav-btn active" onclick="nav('dashboard')">📊 Dashboard</button>
            <button class="nav-btn" onclick="nav('products')">💎 Qiymətlər</button>
            <button class="nav-btn" onclick="nav('promo')">🎟️ Promo Kodlar</button>
            <button class="nav-btn" onclick="nav('announcement')">📢 Duyurular</button>
            <button class="nav-btn" onclick="nav('blacklist')">🚫 Qara Siyahı</button>
        </div>

        <div class="nav-group owner-section owner-only">
            <p style="font-size:10px; color:var(--gold); margin-bottom:10px; font-family:'Orbitron'">OWNER V5.0</p>
            <button class="nav-btn" onclick="nav('logs')" style="color:var(--gold)">📜 Admin Loqları</button>
            <button class="nav-btn" onclick="nav('finance')" style="color:var(--gold)">💰 Maliyyə</button>
        </div>
    </aside>

    <main class="workspace">
        <section id="dashboard" class="section active">
            <h2 style="font-family:'Orbitron'; margin-bottom:15px;">Dashboard</h2>
            <div class="grid-stats">
                <div class="stat-card">
                    <p style="font-size:10px; color:#555;">SATIŞLAR</p>
                    <div class="stat-val">0 AZN</div>
                </div>
                <div class="stat-card owner-section owner-only" style="border-color:var(--gold)">
                    <p style="font-size:10px; color:var(--gold);">XALİS QAZANC</p>
                    <div class="stat-val">0 AZN</div>
                </div>
            </div>
            <div style="background:var(--card); padding:10px; border-radius:10px;">
                <canvas id="chart" height="150"></canvas>
            </div>
        </section>

        <section id="products" class="section">
            <h2 style="font-family:'Orbitron'; margin-bottom:15px;">Kataloq</h2>
            <div id="game-list" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:20px;"></div>
            <div id="price-editor" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:10px;">
                <p style="color:#444">Bir oyun seçin...</p>
            </div>
        </section>

        <section id="logs" class="section">
            <h2 style="font-family:'Orbitron'; color:var(--gold);">Sistem Loqları</h2>
            <div style="background:#111; padding:15px; border-radius:8px; margin-top:15px; font-size:12px; font-family:monospace; color:var(--green)">
                [14:20] Admin daxil oldu.<br>
                [14:22] Qiymət dəyişdirildi (Robux 800).
            </div>
        </section>

        </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop",
            appId: "1:123258254071:web:ae147159986886134a59f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Funksiyaları Window obyektinə bağlayırıq ki, HTML-dən çağırmaq olsun
        window.nav = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(window.innerWidth < 768) toggleSidebar();
        };

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('open');
        };

        window.tryLogin = async () => {
            const pass = document.getElementById('pass-key').value;
            const snap = await get(ref(db, 'security'));
            if(snap.exists()){
                const data = snap.val();
                if(pass === data.owner_pass) setupRole('owner');
                else if(pass === data.admin_pass) setupRole('admin');
                else alert("Yanlış şifrə!");
            }
        };

        function setupRole(role) {
            document.getElementById('auth-overlay').style.display = 'none';
            sessionStorage.setItem('role', role);
            
            const badge = document.getElementById('role-display');
            if(role === 'owner') {
                badge.innerText = "OWNER v5.0";
                badge.className = "role-badge owner-badge";
                document.querySelectorAll('.owner-section').forEach(el => el.style.setProperty('display', 'block', 'important'));
            } else {
                badge.innerText = "ADMIN v2.5";
                badge.className = "role-badge admin-badge";
                document.querySelectorAll('.owner-section').forEach(el => el.remove());
            }
        }

        // Oyun Siyahısı Yükləmə
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "steambalans"];
        const gameContainer = document.getElementById('game-list');
        games.forEach(g => {
            const btn = document.createElement('button');
            btn.innerText = g.toUpperCase();
            btn.className = "nav-btn";
            btn.style.width = "auto";
            btn.onclick = () => loadPrices(g);
            gameContainer.appendChild(btn);
        });

        async function loadPrices(game) {
            const editor = document.getElementById('price-editor');
            editor.innerHTML = "Yüklənir...";
            const snap = await get(ref(db, `prices/${game}`));
            editor.innerHTML = "";
            const data = snap.val() || {};
            Object.keys(data).forEach(key => {
                editor.innerHTML += `
                    <div class="stat-card">
                        <p style="font-size:10px;">${key}</p>
                        <input type="text" value="${data[key]}" id="val-${game}-${key}">
                        <button class="btn-main" style="padding:5px; font-size:10px" onclick="updatePrice('${game}','${key}')">UPDATE</button>
                    </div>
                `;
            });
        }

        window.updatePrice = (game, key) => {
            const val = document.getElementById(`val-${game}-${key}`).value;
            set(ref(db, `prices/${game}/${key}`), val).then(() => alert("Uğurlu!"));
        };

        // Yadda saxlanılmış sessiya
        const saved = sessionStorage.getItem('role');
        if(saved) setupRole(saved);

        // Chart.js (Nümunə)
        const ctx = document.getElementById('chart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: { labels: ['B.e', 'Ç.a', 'Ç', 'C.a', 'C', 'Ş', 'B'], datasets: [{ label: 'Satışlar', data: [12, 19, 3, 5, 2, 3, 9], borderColor: '#ff4655' }] },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    </script>
</body>
</html>
