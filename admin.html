<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox Pro v6.0 | Final Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4655; --bg: #050505; --card: #0e0e0e; --text: #eee; --green: #00ff88; --gold: #ffd700; --accent: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #0a0a0a; padding: 30px; border: 1px solid var(--accent); border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }

        /* Header */
        header { background: #000; border-bottom: 1px solid var(--accent); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .logo { font-family: 'Orbitron'; font-size: 14px; color: var(--primary); letter-spacing: 2px; }

        /* Navigation - Mobildə aşağıda, PC-də yuxarıda */
        nav { background: #080808; border-bottom: 1px solid var(--accent); display: flex; overflow-x: auto; white-space: nowrap; flex-shrink: 0; }
        .nav-link { padding: 15px 20px; color: #555; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; border-bottom: 2px solid transparent; transition: 0.3s; }
        .nav-link.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(255, 70, 85, 0.05); }

        /* Main Workspace */
        main { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .section { display: none; max-width: 1000px; margin: 0 auto; }
        .section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Cards */
        .card { background: var(--card); border: 1px solid var(--accent); padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: #fff; border-radius: 10px; margin-top: 10px; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-family: 'Orbitron'; margin-top: 10px; }
        
        /* Game Selection Chips */
        .game-bar { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 15px; margin-bottom: 10px; scrollbar-width: none; }
        .game-bar::-webkit-scrollbar { display: none; }
        .game-chip { padding: 10px 20px; background: #151515; border-radius: 50px; font-size: 11px; cursor: pointer; border: 1px solid var(--accent); white-space: nowrap; color: #888; font-family: 'Orbitron'; }
        .game-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 15px rgba(255, 70, 85, 0.3); }

        /* Log Screen */
        .log-box { background: #000; border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 12px; color: var(--green); min-height: 300px; line-height: 1.8; }
        .log-item { border-bottom: 1px solid #111; padding: 5px 0; display: block; }
        .log-time { color: #555; margin-right: 10px; }
        .log-user { color: var(--gold); font-weight: bold; }

        @media (max-width: 768px) {
            header { padding: 12px 15px; }
            nav { position: fixed; bottom: 0; left: 0; right: 0; border-bottom: none; border-top: 1px solid var(--accent); z-index: 1000; justify-content: space-around; }
            .nav-link { padding: 12px 10px; font-size: 10px; flex: 1; text-align: center; border-bottom: none; border-top: 2px solid transparent; }
            .nav-link.active { border-top-color: var(--primary); border-bottom-color: transparent; }
            main { padding-bottom: 80px; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family:'Orbitron'; color:var(--primary); margin-bottom:10px;">GLIDOX ACCESS</h2>
            <p style="font-size:12px; color:#555; margin-bottom:20px;">Xahiş olunur məlumatları daxil edin</p>
            <input type="text" id="adm-name" placeholder="Adınız (məs: Eli)">
            <input type="password" id="adm-pass" placeholder="Məxfi Şifrə">
            <button class="btn" onclick="login()">DAXİL OL</button>
        </div>
    </div>

    <header>
        <div class="logo">GLIDOX PRO</div>
        <div id="user-badge" style="font-size:10px; font-family:'Orbitron'; color:var(--gold)">MÜŞAHİDƏÇİ</div>
    </header>

    <nav>
        <div class="nav-link active" onclick="tab('dash')">📊 Dash</div>
        <div class="nav-link" onclick="tab('prices')">💎 Qiymət</div>
        <div class="nav-link" onclick="tab('promo')">🎟️ Promo</div>
        <div class="nav-link" onclick="tab('ann')">📢 Duyuru</div>
        <div class="nav-link" onclick="tab('bl')">🚫 Blacklist</div>
        <div class="nav-link owner-only" id="nav-logs" style="display:none;" onclick="tab('logs')">📜 Loqlar</div>
    </nav>

    <main>
        <section id="dash" class="section active">
            <h3 style="margin-bottom:20px; font-family:'Orbitron'; font-size:16px;">Xoş gəldiniz, <span id="welcome-name">...</span></h3>
            <div class="grid">
                <div class="card">
                    <p style="font-size:11px; color:#555; letter-spacing:1px;">GÜNLÜK SATIŞ</p>
                    <h2 style="font-family:'Orbitron'; margin-top:5px;">0 AZN</h2>
                </div>
                <div class="card owner-only" style="display:none; border-color:var(--gold)">
                    <p style="font-size:11px; color:var(--gold);">MƏNFƏƏT (AYLIQ)</p>
                    <h2 style="font-family:'Orbitron'; margin-top:5px; color:var(--green)">+0 AZN</h2>
                </div>
            </div>
        </section>

        <section id="prices" class="section">
            <div class="game-bar" id="game-chips"></div>
            <div id="price-grid" class="grid"></div>
        </section>

        <section id="promo" class="section">
            <div class="card">
                <input type="text" id="p-name" placeholder="KOD ADI">
                <input type="number" id="p-val" placeholder="ENDİRİM %">
                <button class="btn" onclick="savePromo()">YARAT</button>
            </div>
            <div id="promo-list" class="grid"></div>
        </section>

        <section id="ann" class="section">
            <div class="card">
                <textarea id="ann-text" rows="5" placeholder="Saytda görünəcək mesaj..."></textarea>
                <select id="ann-status">
                    <option value="active">AKTİV</option>
                    <option value="inactive">DEAKTİV</option>
                </select>
                <button class="btn" onclick="saveAnn()">YADDA SAXLA</button>
            </div>
        </section>

        <section id="bl" class="section">
            <div class="card">
                <input type="text" id="bl-input" placeholder="IP və ya User ID">
                <button class="btn" style="background:red" onclick="saveBL()">QARA SİYAHIYA SAL</button>
            </div>
            <div id="bl-list" class="grid"></div>
        </section>

        <section id="logs" class="section">
            <div class="log-box" id="log-content">Loqlar yüklənir...</div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop",
            appId: "1:123258254071:web:ae147159986886134a59f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentUser = "";
        let currentRole = "";
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        window.login = async () => {
            const n = document.getElementById('adm-name').value;
            const p = document.getElementById('adm-pass').value;
            if(!n || !p) return alert("Ad və şifrə mütləqdir!");

            const snap = await get(ref(db, 'security'));
            const data = snap.val();

            if(p === data.owner_pass) currentRole = "owner";
            else if(p === data.admin_pass) currentRole = "admin";
            else return alert("Şifrə yanlışdır!");

            currentUser = n;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('welcome-name').innerText = n;
            document.getElementById('user-badge').innerText = currentRole.toUpperCase();

            if(currentRole === 'owner') {
                document.querySelectorAll('.owner-only').forEach(el => el.style.display = 'block');
                document.getElementById('nav-logs').style.display = 'block';
                syncLogs();
            }

            logAction("Sistemə giriş etdi.");
            initApp();
        };

        function logAction(action) {
            const time = new Date().toLocaleString('az-AZ');
            push(ref(db, 'logs'), {
                admin: currentUser,
                action: action,
                time: time
            });
        }

        window.tab = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        };

        function initApp() {
            // Chips
            const chipBox = document.getElementById('game-chips');
            chipBox.innerHTML = games.map(g => `<div class="game-chip" onclick="loadPrices('${g}')">${g.toUpperCase()}</div>`).join('');
            loadPrices('roblox');

            // Promos
            onValue(ref(db, 'promocodes'), snap => {
                const list = document.getElementById('promo-list'); list.innerHTML = "";
                snap.forEach(p => {
                    list.innerHTML += `<div class="card"><b>${p.key}</b> (${p.val().percent}%) <button class="btn" style="padding:5px; margin:0" onclick="delPromo('${p.key}')">SİL</button></div>`;
                });
            });

            // Blacklist
            onValue(ref(db, 'blacklist'), snap => {
                const list = document.getElementById('bl-list'); list.innerHTML = "";
                snap.forEach(b => {
                    list.innerHTML += `<div class="card">ID: ${b.val().d} <button class="btn" style="padding:5px; margin:0; background:#333" onclick="delBL('${b.key}')">AZAD ET</button></div>`;
                });
            });
        }

        window.loadPrices = (game) => {
            document.querySelectorAll('.game-chip').forEach(c => c.classList.remove('active'));
            event?.target?.classList?.add('active');
            onValue(ref(db, `prices/${game}`), snap => {
                const grid = document.getElementById('price-grid'); grid.innerHTML = "";
                const data = snap.val() || {};
                Object.keys(data).forEach(k => {
                    grid.innerHTML += `<div class="card"><p style="font-size:11px; color:var(--primary)">${k}</p>
                    <input type="text" value="${data[k]}" id="in-${game}-${k}">
                    <button class="btn" style="padding:8px; font-size:10px" onclick="savePrice('${game}','${k}')">YENİLƏ</button></div>`;
                });
            });
        };

        window.savePrice = (g, k) => {
            const v = document.getElementById(`in-${g}-${k}`).value;
            set(ref(db, `prices/${g}/${k}`), v).then(() => {
                logAction(`${g.toUpperCase()} (${k}) qiymətini ${v} etdi.`);
                alert("Yeniləndi!");
            });
        };

        window.savePromo = () => {
            const n = document.getElementById('p-name').value;
            const v = document.getElementById('p-val').value;
            set(ref(db, `promocodes/${n}`), { percent: v }).then(() => logAction(`Yeni promo yaratdı: ${n}`));
        };

        window.delPromo = (k) => remove(ref(db, `promocodes/${k}`)).then(() => logAction(`${k} promosunu sildi.`));

        window.saveAnn = () => {
            const t = document.getElementById('ann-text').value;
            const s = document.getElementById('ann-status').value;
            set(ref(db, 'announcement'), { text: t, status: s }).then(() => {
                logAction("Duyurunu yenilədi.");
                alert("Uğurlu!");
            });
        };

        window.saveBL = () => {
            const v = document.getElementById('bl-input').value;
            push(ref(db, 'blacklist'), { d: v, t: new Date().toLocaleDateString() }).then(() => logAction(`${v} blacklistə atıldı.`));
        };

        window.delBL = (k) => remove(ref(db, `blacklist/${k}`));

        function syncLogs() {
            onValue(ref(db, 'logs'), snap => {
                const box = document.getElementById('log-content'); box.innerHTML = "";
                snap.forEach(l => {
                    const d = l.val();
                    // undefined xətasının qarşısını almaq üçün yoxlanış:
                    const admin = d.admin || "Sistem";
                    const action = d.action || "Məlumat yoxdur";
                    const time = d.time || "Naməlum";
                    
                    box.innerHTML = `<div class="log-item"><span class="log-time">[${time}]</span> <span class="log-user">${admin}</span>: ${action}</div>` + box.innerHTML;
                });
            });
        }
    </script>
</body>
</html>
