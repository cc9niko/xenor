<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glidox Titan v50 | Admin & Owner Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<style>
/* GLIDOX TITAN PREMIUM PANEL SYSTEM */
:root {
  --bg-deep: #020203;
  --bg-surface: #0a0a0c;
  --bg-card: #111114;
  --primary: #00f2ff;
  --primary-glow: rgba(0,242,255,0.4);
  --owner-gold: #ffcc00;
  --owner-glow: rgba(255,204,0,0.4);
  --accent: var(--primary);
  --danger: #ff3366;
  --success: #00ffaa;
  --text-main: #e2e8f0;
  --text-dim: #64748b;
  --border-color: rgba(255,255,255,0.05);
  --sidebar-width: 300px;
}

* {margin:0; padding:0; box-sizing:border-box;}
body {background:var(--bg-deep); color:var(--text-main); font-family:'Space Grotesk', sans-serif; overflow:hidden; height:100vh;}
::-webkit-scrollbar {width:5px;}
::-webkit-scrollbar-thumb {background:var(--accent); border-radius:10px;}

/* AUTH SCREEN */
#auth-screen {position:fixed; inset:0; z-index:1000; display:flex; justify-content:center; align-items:center; background:radial-gradient(circle at center,#0a0a0c 0%,#020203 100%);}
.auth-box {background:var(--bg-card); border:1px solid var(--border-color); padding:50px; border-radius:30px; width:420px; text-align:center; box-shadow:0 0 50px rgba(0,0,0,0.5); position:relative;}
.auth-box::before {content:''; position:absolute; inset:-1px; border-radius:30px; background:linear-gradient(45deg,var(--accent),transparent,var(--accent)); opacity:0.3; z-index:-1;}
.auth-logo {font-size:32px; font-weight:800; margin-bottom:30px; letter-spacing:-1px;}
.auth-logo span {color:var(--accent);}
.field {margin-bottom:20px; text-align:left;}
.field label {font-size:11px; text-transform:uppercase; color:var(--text-dim); font-weight:700; margin-bottom:8px; display:block;}
.field input {width:100%; background:#000; border:1px solid var(--border-color); padding:15px; border-radius:12px; color:#fff; transition:0.3s;}
.field input:focus {border-color:var(--accent); box-shadow:0 0 15px var(--primary-glow);}
.login-btn {width:100%; padding:15px; border-radius:12px; border:none; background:var(--accent); color:#000; font-weight:800; cursor:pointer; text-transform:uppercase; letter-spacing:1px;}

/* MAIN LAYOUT */
#main-wrapper {display:none; height:100vh;}
aside {width:var(--sidebar-width); background:var(--bg-surface); border-right:1px solid var(--border-color); display:flex; flex-direction:column; padding:40px 20px;}
.side-brand {font-size:24px; font-weight:800; margin-bottom:50px; display:flex; align-items:center; gap:10px;}
.side-brand i {color:var(--accent);}
.menu-grp {margin-bottom:30px;}
.menu-label {font-size:10px; color:var(--text-dim); text-transform:uppercase; font-weight:800; margin-bottom:15px; padding-left:15px;}
.nav-item {padding:14px 18px; border-radius:12px; margin-bottom:5px; cursor:pointer; display:flex; align-items:center; gap:15px; font-weight:600; color:var(--text-dim); transition:0.2s;}
.nav-item:hover {background:rgba(255,255,255,0.03); color:#fff;}
.nav-item.active {background:var(--accent); color:#000; box-shadow:0 10px 20px var(--primary-glow);}
.nav-item i {font-size:18px; width:20px;}
.owner-only, .admin-only {display:none;}

main {flex:1; display:flex; flex-direction:column; overflow:hidden;}
header {height:90px; padding:0 40px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border-color);}
.role-badge {background:rgba(0,242,255,0.1); color:var(--accent); padding:6px 15px; border-radius:50px; font-size:11px; font-weight:800; border:1px solid var(--accent);}
.view-container {flex:1; overflow-y:auto; padding:40px;}
.view {display:none; animation:fadeIn 0.5s ease;}
.view.active {display:block;}
@keyframes fadeIn {from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);}}
.stat-grid {display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:40px;}
.stat-card {background:var(--bg-card); border:1px solid var(--border-color); padding:30px; border-radius:24px; transition:0.3s;}
.stat-card:hover {border-color:var(--accent); transform:translateY(-5px);}
.stat-title {font-size:12px; color:var(--text-dim); text-transform:uppercase; font-weight:700;}
.stat-value {font-size:32px; font-weight:800; color:#fff; margin-top:10px; font-family:'JetBrains Mono';}
.price-list {display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px;}
.price-item {background:var(--bg-card); border:1px solid var(--border-color); padding:25px; border-radius:20px; display:flex; flex-direction:column; gap:20px;}
.price-item h3 {font-size:16px; color:#fff;}
.price-row {display:flex; gap:10px;}
.price-row input {flex:1; padding:12px; border-radius:10px; background:#000; border:1px solid #222; color:var(--success); font-weight:700;}
.price-row button {padding:0 20px; border-radius:10px; border:none; background:var(--accent); color:#000; font-weight:800; cursor:pointer;}
.terminal {background:#000; border:1px solid #1a1a1e; border-radius:20px; padding:30px; height:500px; overflow-y:auto; font-family:'JetBrains Mono',monospace;}
.log-line {margin-bottom:10px; font-size:13px; display:flex; gap:15px;}
.log-t {color:#444;}
.log-u {color:var(--accent); font-weight:700;}
.log-m {color:#888;}
#toast-box {position:fixed; bottom:30px; right:30px; z-index:10000;}
.toast {background:#fff; color:#000; padding:15px 30px; border-radius:12px; font-weight:800; margin-top:10px; box-shadow:0 10px 40px rgba(0,0,0,0.5); animation:slideIn 0.4s cubic-bezier(0.23,1,0.32,1);}
@keyframes slideIn {from {transform:translateX(100%);} to {transform:translateX(0);}}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">GLIDOX <span>TITAN</span></div>
    <div class="field">
      <label>İstifadəçi Adı</label>
      <input type="text" id="u-name" placeholder="Məsələn: admin">
    </div>
    <div class="field">
      <label>Şifrə</label>
      <input type="password" id="u-pass" placeholder="••••••">
    </div>
    <button class="login-btn" id="btn-login">Daxil Ol <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
  </div>
</div>

<div id="main-wrapper">
  <aside>
    <div class="side-brand"><i class="fa-solid fa-microchip"></i> TITAN <span>v50</span></div>

    <div class="menu-grp admin-only">
      <div class="menu-label">Admin Paneli</div>
      <div class="nav-item active" data-v="dash"><i class="fa-solid fa-house"></i> Analitika</div>
      <div class="nav-item" data-v="prices"><i class="fa-solid fa-tag"></i> Qiymət İdarəsi</div>
      <div class="nav-item" data-v="ann"><i class="fa-solid fa-bullhorn"></i> Duyurular</div>
    </div>

    <div class="menu-grp owner-only">
      <div class="menu-label">Owner Paneli</div>
      <div class="nav-item" data-v="logs"><i class="fa-solid fa-terminal"></i> Sistem Loqları</div>
      <div class="nav-item" data-v="promo"><i class="fa-solid fa-ticket"></i> Promo Kodlar</div>
      <div class="nav-item" data-v="blacklist"><i class="fa-solid fa-user-slash"></i> Qara Siyahı</div>
    </div>

    <div style="margin-top:auto;">
      <div class="nav-item" style="color:var(--danger)" onclick="location.reload()"><i class="fa-solid fa-power-off"></i> Çıxış</div>
    </div>
  </aside>

  <main>
    <header>
      <h2 id="view-title">Sistem Analitikası</h2>
      <div class="role-badge" id="ui-role">ROLUNUZ</div>
    </header>

    <div class="view-container">
      <section id="v-dash" class="view active">
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-title">Toplam Oyun</div><div class="stat-value">12</div></div>
          <div class="stat-card"><div class="stat-title">Aktiv Paket</div><div class="stat-value" id="count-p">0</div></div>
          <div class="stat-card"><div class="stat-title">CPU Status</div><div class="stat-value" style="color:var(--success)">STABİL</div></div>
          <div class="stat-card"><div class="stat-title">Giriş IP</div><div class="stat-value" style="font-size:14px;">192.168.1.1</div></div>
        </div>
        <div style="background:var(--bg-card); padding:30px; border-radius:30px; border:1px solid var(--border-color);">
          <canvas id="titanChart" height="100"></canvas>
        </div>
      </section>

      <section id="v-prices" class="view">
        <div id="price-container" class="price-list"></div>
      </section>

      <section id="v-ann" class="view">
        <textarea id="ann-input" style="width:100%; height:150px; background:#000; border:1px solid #222; color:#fff; padding:20px; border-radius:15px; font-size:16px; margin-bottom:20px;" placeholder="Duyuru yazın..."></textarea>
        <button class="login-btn" id="btn-ann">YAYINLA</button>
      </section>

      <section id="v-logs" class="view owner-only">
        <div class="terminal" id="terminal"></div>
      </section>

      <section id="v-promo" class="view owner-only">
        <div style="color:#fff;">Promo Kodlar Bölməsi</div>
      </section>

      <section id="v-blacklist" class="view owner-only">
        <div style="color:#fff;">Qara Siyahı Bölməsi</div>
      </section>

    </div>
  </main>
</div>

<div id="toast-box"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, push, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {apiKey:"API_KEY", databaseURL:"DATABASE_URL", projectId:"PROJECT_ID"};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let state = {user:'', role:'', activeV:'dash', games:[]};

const showToast = m => {const t=document.createElement('div'); t.className='toast'; t.innerText=m; document.getElementById('toast-box').appendChild(t); setTimeout(()=>t.remove(),3000);};
const sysLog = m => {push(ref(db,'logs'),{u:state.user,m:m,t:new Date().toLocaleTimeString()});};

const btnLogin=document.getElementById('btn-login');
btnLogin.addEventListener('click',async()=>{
 let u=document.getElementById('u-name').value;
 let p=document.getElementById('u-pass').value;
 if(!u||!p) return alert('Doldurun!');
 let userSnap = await get(child(ref(db), `users/${u}`));
 if(!userSnap.exists()) return alert('İstifadəçi tapılmadı!');
 let dbPass=userSnap.val().password; let dbRole=userSnap.val().role;
 if(p!==dbPass) return alert('Şifrə səhvdir!');
 state.user=u; state.role=dbRole;
 document.getElementById('auth-screen').style.display='none';
 document.getElementById('main-wrapper').style.display='flex';
 if(state.role==='OWNER'){
   document.documentElement.style.setProperty('--accent','var(--owner-gold)');
   document.documentElement.style.setProperty('--primary-glow','var(--owner-glow)');
   document.querySelectorAll('.owner-only').forEach(e=>e.style.display='block');
   document.getElementById('ui-role').innerText='SYSTEM OWNER';
   document.getElementById('ui-role').style.color='var(--owner-gold)';
   document.getElementById('ui-role').style.borderColor='var(--owner-gold)';
 } else {
   document.querySelectorAll('.admin-only').forEach(e=>e.style.display='block');
   document.getElementById('ui-role').innerText='ADMIN ACCESS';
 }
 sysLog('Sistəmə giriş etdi.');
 showToast('Sistem Hazırdır!');
});

// NAVIGATION
document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>{
 document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
 document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
 item.classList.add('active');
 document.getElementById('v-'+item.dataset.v).classList.add('active');
 document.getElementById('view-title').innerText=item.innerText;
});});

// LOGS
if(state.role==='OWNER'){
 onValue(ref(db,'logs'),snap=>{
   const term=document.getElementById('terminal'); term.innerHTML='';
   snap.forEach(c=>{
     let l=c.val();
     term.innerHTML+=`<div class="log-line"><span class="log-t">[${l.t}]</span> <span class="log-u">${l.u}@titan:~$</span> <span class="log-m">${l.m}</span></div>`;
   });
});
}
</script>

</body>
</html>
