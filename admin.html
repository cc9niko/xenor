<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="dynamic-title">Glidox Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-ultra: #020204; --bg-panel: #0a0a0f; --primary: #00f2ff;
            --owner-gold: #ffaa00; --danger: #ff3e3e; --border: rgba(255, 255, 255, 0.05);
            --sidebar-w: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg-ultra); 
            color: #888b94; 
            font-family: 'Outfit', sans-serif; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
        }

        /* --- GİRİŞ EKRANI --- */
        #gatekeeper { position: fixed; inset: 0; z-index: 10000; background: #020204; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-frame { background: var(--bg-panel); border: 1px solid var(--border); padding: 30px; border-radius: 25px; width: 100%; max-width: 380px; text-align: center; }
        .f-group input { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; margin-top: 10px; outline: none; font-size: 16px; }

        /* --- ƏSAS STRUKTUR --- */
        #titan-root { display: none; width: 100%; height: 100%; flex-direction: row; }
        
        aside { 
            width: var(--sidebar-w); 
            background: var(--bg-panel); 
            border-right: 1px solid var(--border); 
            padding: 30px 15px; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0;
        }

        main { flex: 1; overflow-y: auto; padding: 30px; position: relative; }

        /* --- NAVİQASİYA --- */
        .nav-link { padding: 14px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; margin-bottom: 5px; transition: 0.2s; font-size: 15px; }
        .nav-link:hover { background: rgba(0, 242, 255, 0.05); }
        .nav-link.active { background: var(--primary); color: #000; }
        
        /* --- PANEL ELEMENTLƏRİ --- */
        .glass-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 25px; padding: 20px; margin-bottom: 25px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none; font-family: inherit; font-size: 15px; }

        .price-box { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); }
        .p-key { flex: 2; color: var(--primary); font-weight: bold; background: #111 !important; }
        .p-val { flex: 1; text-align: center; }
        
        .btn-del { background: rgba(255, 62, 62, 0.1); border: none; color: var(--danger); cursor: pointer; width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: #000; font-weight: 900; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        
        .btn-clear-logs { background: var(--danger); color: white; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; }

        @media (max-width: 768px) {
            #titan-root { flex-direction: column; }
            aside { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; flex-direction: row; overflow-x: auto; padding: 10px; }
            aside h3 { display: none; }
            .nav-link { padding: 10px 15px; font-size: 13px; margin-bottom: 0; white-space: nowrap; }
            main { padding: 15px; }
            .price-box { flex-direction: column; }
        }

        .view { display: none; } .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="login-frame">
            <h2 style="color:#fff; font-weight:900;">GLIDOX LOGIN</h2>
            <div class="f-group">
                <input type="email" id="f-email" placeholder="Email">
                <input type="password" id="f-pass" placeholder="Şifrə">
            </div>
            <button class="btn-main" id="btn-login-trigger" style="margin-top:20px;">GİRİŞ</button>
            <p id="auth-err" style="color:var(--danger); font-size:11px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="titan-root">
        <aside>
            <h3 style="color:#fff; margin-bottom:20px;"><i class="fa-solid fa-bolt" style="color:var(--primary)"></i> GLIDOX</h3>
            <div class="nav-link active" data-target="pg-dash"><i class="fa-solid fa-house"></i> Dash</div>
            <div class="nav-link" data-target="pg-prices"><i class="fa-solid fa-tags"></i> Qiymət</div>
            <div class="nav-link" data-target="pg-ann"><i class="fa-solid fa-bullhorn"></i> Duyuru</div>
            <div class="nav-link" data-target="pg-blist"><i class="fa-solid fa-user-slash"></i> Ban</div>
            <div id="owner-link-container" style="display: none;">
                <div class="nav-link" data-target="pg-logs" style="color:var(--owner-gold)"><i class="fa-solid fa-database"></i> Loqlar</div>
            </div>
            <button id="btn-logout" style="background:none; border:1px solid var(--danger); color:var(--danger); padding:8px 15px; border-radius:8px; cursor:pointer; margin-top:auto;">ÇIXIŞ</button>
        </aside>

        <main>
            <div id="pg-dash" class="view active">
                <div class="glass-panel">
                    <h2 id="panel-welcome-title">Yüklənir...</h2>
                    <p id="role-text" style="font-weight:900; margin-top: 10px;"></p>
                </div>
            </div>

            <div id="pg-prices" class="view">
                <div class="glass-panel">
                    <h3>Qiymət Redaktoru</h3>
                    <select id="game-select">
                        <option value="">Oyun seçin...</option>
                        <option value="roblox">1. Roblox</option>
                        <option value="pubg">2. PUBG Mobile</option>
                        <option value="steambalans">3. Steam Balans</option>
                        <option value="mlbb">4. Mobile Legends</option>
                        <option value="valorant">5. Valorant</option>
                        <option value="freefire">6. Free Fire</option>
                        <option value="brawlstars">7. Brawl Stars</option>
                        <option value="clashofclans">8. Clash of Clans</option>
                        <option value="genshin">9. Genshin Impact</option>
                        <option value="efootball">10. eFootball PES</option>
                        <option value="codm">11. COD Mobile</option>
                        <option value="leagueoflegends">12. League of Legends</option>
                    </select>
                    <div id="price-fields-container"></div>
                    <div id="new-package-area" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:15px;">
                        <input type="text" id="new-p-key" placeholder="Yeni Paket adı">
                        <input type="text" id="new-p-val" placeholder="Qiymət">
                    </div>
                    <button class="btn-main" id="btn-save-prices" style="display:none; margin-top:15px;">YADDA SAXLA</button>
                </div>
            </div>

            <div id="pg-ann" class="view">
                <div class="glass-panel">
                    <h3>Duyuru Sistemi</h3>
                    <textarea id="ann-text" rows="5" placeholder="Mesaj..."></textarea>
                    <button class="btn-main" id="btn-save-ann">YAYIMLA</button>
                </div>
            </div>

            <div id="pg-blist" class="view">
                <div class="glass-panel">
                    <h3>Blacklist</h3>
                    <input type="text" id="bl-user-input" placeholder="Email və ya ID">
                    <button class="btn-main" id="btn-add-bl">BLOKLA</button>
                    <div id="bl-list-container" style="margin-top:20px;"></div>
                </div>
            </div>

            <div id="pg-logs" class="view">
                <div class="glass-panel">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3>Sistem Loqları (Owner Only)</h3>
                        <button class="btn-clear-logs" id="btn-clear-logs">Təmizlə</button>
                    </div>
                    <div id="logs-container" style="max-height:450px; overflow-y:auto; background:#000; padding:10px; border-radius:10px; margin-top:15px; font-size:12px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, push, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app", projectId: "glidoxshop" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const OWNER_UID = "dXDTZPPuVKaO1ecsO7UbCOXr15i1";
        const ADMINS = ["tMaqCC1AdoWUYgGTuay2eFKYMOF2", "NaH17on6YEO3bJzWXY16SZ02xtJ2", "Yr5c1JF2Z3T3amIoV3OJanFnFCR2"];
        let userIp = "Yüklənir...";

        // IP-ni əldə et
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => userIp = d.ip);

        async function createLog(action) {
            const user = auth.currentUser;
            if(!user) return;
            await push(ref(db, 'logs'), {
                user: user.email,
                action: action,
                ip: userIp,
                time: new Date().toLocaleString('az-AZ')
            });
        }

        onAuthStateChanged(auth, (user) => {
            if(user && (user.uid === OWNER_UID || ADMINS.includes(user.uid))) {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('titan-root').style.display = 'flex';
                const isOwner = user.uid === OWNER_UID;
                
                document.getElementById('panel-welcome-title').innerText = isOwner ? "Owner Xoş Gəldiniz" : "Admin Xoş Gəldiniz";
                const roleText = document.getElementById('role-text');
                roleText.innerText = isOwner ? "STATUS: OWNER" : "STATUS: ADMIN";
                roleText.style.color = isOwner ? "var(--owner-gold)" : "var(--primary)";

                if(isOwner) {
                    document.getElementById('owner-link-container').style.display = 'block';
                    loadLogs();
                }
                
                createLog("Sistemə giriş etdi");
                setupApp(user, isOwner);
            } else if(user) { signOut(auth); }
        });

        function setupApp(user, isOwner) {
            const priceContainer = document.getElementById('price-fields-container');

            // --- Qiymət Yükləmə ---
            document.getElementById('game-select').onchange = (e) => {
                const game = e.target.value;
                if(!game) return priceContainer.innerHTML = "";
                
                document.getElementById('btn-save-prices').style.display = "block";
                document.getElementById('new-package-area').style.display = "block";

                onValue(ref(db, `prices/${game}`), (snap) => {
                    priceContainer.innerHTML = "";
                    const data = snap.val();
                    if(data) {
                        Object.keys(data).forEach(key => {
                            const div = document.createElement('div');
                            div.className = 'price-box';
                            div.innerHTML = `<input type="text" class="p-key" value="${key}" readonly><input type="text" class="p-val" value="${data[key]}"><button class="btn-del"><i class="fa-solid fa-trash"></i></button>`;
                            div.querySelector('.btn-del').onclick = () => div.remove();
                            priceContainer.appendChild(div);
                        });
                    }
                }, {onlyOnce: true});
            };

            // --- Qiymət Yadda Saxla ---
            document.getElementById('btn-save-prices').onclick = async () => {
                const game = document.getElementById('game-select').value;
                const rows = priceContainer.querySelectorAll('.price-box');
                const newK = document.getElementById('new-p-key').value.trim();
                const newV = document.getElementById('new-p-val').value.trim();
                
                let upData = {};
                rows.forEach(r => {
                    const k = r.querySelector('.p-key').value;
                    const v = r.querySelector('.p-val').value;
                    upData[k] = v;
                });
                if(newK && newV) upData[newK] = newV;

                await set(ref(db, `prices/${game}`), upData);
                await createLog(`${game} oyununda qiymətləri yenilədi`);
                alert("Yadda saxlanıldı!");
                location.reload();
            };

            // --- Duyuru ---
            document.getElementById('btn-save-ann').onclick = async () => {
                const msg = document.getElementById('ann-text').value;
                await update(ref(db, 'announcement'), { message: msg });
                await createLog("Duyuru dəyişdirildi");
                alert("Yayımlandı");
            };

            // --- Loqları Sil (Owner) ---
            if(isOwner) {
                document.getElementById('btn-clear-logs').onclick = async () => {
                    if(confirm("Bütün loqlar silinsin?")) {
                        await remove(ref(db, 'logs'));
                        await createLog("BÜTÜN LOQLARI TƏMİZLƏDİ");
                        alert("Loqlar silindi");
                    }
                };
            }
        }

        function loadLogs() {
            onValue(ref(db, 'logs'), (snap) => {
                const container = document.getElementById('logs-container');
                container.innerHTML = "";
                let arr = [];
                snap.forEach(c => { arr.push(c.val()); });
                arr.reverse().forEach(l => {
                    const d = document.createElement('div');
                    d.style.borderBottom = "1px solid #111";
                    d.style.padding = "5px";
                    d.innerHTML = `<span style="color:#555">[${l.time}]</span> <b style="color:var(--primary)">${l.user}</b> (${l.ip}): ${l.action}`;
                    container.appendChild(d);
                });
            });
        }

        // Login Triger
        document.getElementById('btn-login-trigger').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('f-email').value, document.getElementById('f-pass').value)
            .catch(() => document.getElementById('auth-err').innerText = "Giriş rədd edildi!");
        };

        // Logout
        document.getElementById('btn-logout').onclick = async () => {
            await createLog("Sistemdən çıxış etdi");
            signOut(auth).then(() => location.reload());
        };

        // Naviqasiya
        document.querySelectorAll('.nav-link').forEach(n => {
            n.onclick = () => {
                document.querySelectorAll('.nav-link, .view').forEach(x => x.classList.remove('active'));
                n.classList.add('active');
                document.getElementById(n.dataset.target).classList.add('active');
            };
        });
    </script>
</body>
</html>
