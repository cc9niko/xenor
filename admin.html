<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glidox Titan v70 | Full Control</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-ultra: #020204;
            --bg-panel: #0a0a0f;
            --primary: #00f2ff;
            --owner-gold: #ffaa00;
            --danger: #ff3e3e;
            --border: rgba(255, 255, 255, 0.05);
            --sidebar-w: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-ultra); color: #888b94; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; }

        /* Login */
        #gatekeeper { position: fixed; inset: 0; z-index: 10000; background: #020204; display: flex; align-items: center; justify-content: center; }
        .login-frame { background: var(--bg-panel); border: 1px solid var(--border); padding: 40px; border-radius: 30px; width: 380px; text-align: center; }
        .f-group { text-align: left; margin-top: 15px; }
        .f-group input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; margin-top: 5px; outline: none; }
        .btn-auth { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: #000; font-weight: 900; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-auth:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Layout */
        #titan-root { display: none; width: 100%; height: 100%; display: flex; }
        aside { width: var(--sidebar-w); background: var(--bg-panel); border-right: 1px solid var(--border); padding: 30px 15px; display: flex; flex-direction: column; flex-shrink: 0; }
        main { flex: 1; overflow-y: auto; padding: 30px; }

        /* Nav */
        .nav-link { padding: 14px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; margin-bottom: 5px; transition: 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-link.active { background: var(--primary); color: #000; }
        .owner-active .nav-link.active { background: var(--owner-gold); }

        /* UI */
        .glass-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 20px; }
        .stat-card p { font-size: 24px; font-weight: 900; color: #fff; margin-top: 10px; }

        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .view { display: none; }
        .view.active { display: block; }

        /* Terminal */
        .terminal { background: #000; border-radius: 15px; padding: 15px; height: 350px; overflow-y: auto; font-family: 'JetBrains Mono'; font-size: 11px; color: #00ff00; }
        #btn-logout { margin-top: auto; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,62,62,0.3); background: none; color: var(--danger); cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="login-frame">
            <h2 style="color:#fff; font-weight:900; letter-spacing: 2px;">TITAN SYSTEM</h2>
            <p style="font-size: 10px; opacity: 0.5; margin-bottom: 20px;">V70 SECURE ACCESS</p>
            <div class="f-group">
                <input type="email" id="f-email" placeholder="Email">
            </div>
            <div class="f-group">
                <input type="password" id="f-pass" placeholder="Şifrə">
            </div>
            <button class="btn-auth" id="btn-login-trigger">AVTORİZASİYA</button>
            <p id="auth-err" style="color:var(--danger); font-size:11px; margin-top:10px; font-weight: bold;"></p>
        </div>
    </div>

    <div id="titan-root">
        <aside>
            <h3 style="color:#fff; margin-bottom:30px; padding-left:10px;"><i class="fa-solid fa-shield-virus" style="color:var(--primary)"></i> GLIDOX</h3>
            <div class="nav-link active" data-target="pg-dash"><i class="fa-solid fa-chart-line"></i> Dashboard</div>
            <div class="nav-link" data-target="pg-prices"><i class="fa-solid fa-tags"></i> Qiymətlər</div>
            <div class="nav-link" data-target="pg-ann"><i class="fa-solid fa-bullhorn"></i> Duyurular</div>
            <div class="nav-link" data-target="pg-promo"><i class="fa-solid fa-ticket"></i> Promokodlar</div>
            <div class="nav-link" data-target="pg-blist"><i class="fa-solid fa-user-lock"></i> Blacklist</div>
            
            <div id="owner-only-nav" style="display:none;">
                <hr style="opacity:0.05; margin: 15px 0;">
                <div class="nav-link" data-target="pg-logs" style="color:var(--owner-gold)"><i class="fa-solid fa-terminal"></i> Sistem Loqları</div>
            </div>

            <button id="btn-logout">SİSTEMDƏN ÇIXIŞ</button>
        </aside>

        <main>
            <div id="pg-dash" class="view active">
                <div class="stats-grid">
                    <div class="stat-card"><h4>Ümumi Loqlar</h4><p id="stat-logs">0</p></div>
                    <div class="stat-card"><h4>Bloklananlar</h4><p id="stat-bl">0</p></div>
                    <div class="stat-card"><h4>Vəzifəniz</h4><p id="stat-role" style="color:var(--primary)">Yüklənir...</p></div>
                </div>
                <div class="glass-panel">
                    <h3>Sistem Analitikası</h3>
                    <canvas id="mainChart" height="100"></canvas>
                </div>
            </div>

            <div id="pg-prices" class="view">
                <div class="glass-panel">
                    <h3>Qiymət İdarəetməsi</h3>
                    <select id="game-select">
                        <option value="">Oyun seçin...</option>
                        <option value="roblox">Roblox</option>
                        <option value="pubg">PUBG Mobile</option>
                        <option value="mlbb">Mobile Legends</option>
                        <option value="valorant">Valorant</option>
                        <option value="freefire">Free Fire</option>
                        <option value="brawlstars">Brawl Stars</option>
                        <option value="lol">League of Legends</option>
                        <option value="steam">Steam Balans</option>
                        <option value="discord">Discord Nitro</option>
                        <option value="xbox">Xbox Gift Card</option>
                        <option value="psn">PSN Card</option>
                        <option value="minecraft">Minecraft</option>
                    </select>
                    <div id="price-fields"></div>
                    <button class="btn-auth" id="btn-save-prices" style="display:none;">YADDA SAXLA</button>
                </div>
            </div>

            <div id="pg-ann" class="view">
                <div class="glass-panel">
                    <h3>Yeni Duyuru</h3>
                    <textarea id="ann-text" rows="5" placeholder="Müştərilər üçün mesaj..."></textarea>
                    <button class="btn-auth" id="btn-save-ann">YAYIMLA</button>
                </div>
            </div>

            <div id="pg-promo" class="view">
                <div class="glass-panel">
                    <h3>Promokod Yarat</h3>
                    <input type="text" id="promo-name" placeholder="KOD ADI (Məs: YENIYIL)">
                    <input type="number" id="promo-val" placeholder="Endirim Miqdarı (Məs: 5)">
                    <button class="btn-auth" id="btn-add-promo">KODU ƏLAVƏ ET</button>
                    <div id="promo-list" style="margin-top:20px;"></div>
                </div>
            </div>

            <div id="pg-blist" class="view">
                <div class="glass-panel">
                    <h3>Blacklist Control</h3>
                    <div style="display:flex; gap:10px;">
                        <input type="text" id="bl-input" placeholder="UID və ya Email" style="margin:0">
                        <button id="btn-add-bl" style="background:var(--danger); border:none; padding:0 20px; border-radius:10px; color:#fff; font-weight:900; cursor:pointer;">BLOKLA</button>
                    </div>
                    <div id="bl-list" style="margin-top:20px;"></div>
                </div>
            </div>

            <div id="pg-logs" class="view">
                <div class="glass-panel">
                    <button id="btn-clear-logs" style="float:right; background:var(--danger); border:none; color:#fff; padding:8px 15px; border-radius:10px; font-size:10px; cursor:pointer;">TƏMİZLƏ</button>
                    <h3>Root Terminal</h3>
                    <div class="terminal" id="log-terminal" style="margin-top:15px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8",
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const OWNER_UID = "dXDTZPPuVKaO1ecsO7UbCOXr15i1";
        const ADMINS = ["tMaqCC1AdoWUYgGTuay2eFKYMOF2", "NaH17on6YEO3bJzWXY16SZ02xtJ2", "Yr5c1JF2Z3T3amIoV3OJanFnFCR2"];

        setPersistence(auth, browserSessionPersistence);

        // LOGIN ENGINE
        document.getElementById('btn-login-trigger').onclick = () => {
            const e = document.getElementById('f-email').value;
            const p = document.getElementById('f-pass').value;
            if(!e || !p) return;
            signInWithEmailAndPassword(auth, e, p).catch(err => {
                document.getElementById('auth-err').innerText = "Giriş rədd edildi!";
            });
        };

        onAuthStateChanged(auth, (user) => {
            if(user) {
                const isOwner = user.uid === OWNER_UID;
                const isAdmin = ADMINS.includes(user.uid);

                if(isOwner || isAdmin) {
                    document.getElementById('gatekeeper').style.display = 'none';
                    document.getElementById('titan-root').style.display = 'flex';
                    setupApp(user, isOwner);
                } else {
                    signOut(auth);
                    alert("İcazəsiz Giriş!");
                }
            } else {
                document.getElementById('gatekeeper').style.display = 'flex';
                document.getElementById('titan-root').style.display = 'none';
            }
        });

        function setupApp(user, isOwner) {
            if(isOwner) {
                document.body.classList.add('owner-active');
                document.getElementById('owner-only-nav').style.display = 'block';
                document.getElementById('stat-role').innerText = "OWNER";
                document.getElementById('stat-role').style.color = "var(--owner-gold)";
            } else {
                document.getElementById('stat-role').innerText = "ADMIN";
            }

            // Qiymət seçimi
            document.getElementById('game-select').onchange = (e) => {
                const game = e.target.value;
                const fields = document.getElementById('price-fields');
                const btn = document.getElementById('btn-save-prices');
                fields.innerHTML = "";
                if(!game) { btn.style.display="none"; return; }
                btn.style.display="block";
                onValue(ref(db, `prices/${game}`), s => {
                    const d = s.val() || {p1:0, p2:0, p3:0};
                    fields.innerHTML = `
                        <p style="font-size:12px; margin-bottom:5px;">Paket 1:</p><input id="p1" value="${d.p1}">
                        <p style="font-size:12px; margin-bottom:5px;">Paket 2:</p><input id="p2" value="${d.p2}">
                        <p style="font-size:12px; margin-bottom:5px;">Paket 3:</p><input id="p3" value="${d.p3}">
                    `;
                }, {onlyOnce: true});
            };

            document.getElementById('btn-save-prices').onclick = () => {
                const g = document.getElementById('game-select').value;
                update(ref(db, `prices/${g}`), {
                    p1: document.getElementById('p1').value,
                    p2: document.getElementById('p2').value,
                    p3: document.getElementById('p3').value
                }).then(() => {
                    alert("Yadda saxlanıldı!");
                    writeLog(user.email, `${g} qiymətlərini dəyişdi`);
                });
            };

            // Duyuru
            document.getElementById('btn-save-ann').onclick = () => {
                set(ref(db, 'announcement'), { message: document.getElementById('ann-text').value, time: new Date().toLocaleString() });
            };

            // Promokodlar
            document.getElementById('btn-add-promo').onclick = () => {
                const name = document.getElementById('promo-name').value;
                const val = document.getElementById('promo-val').value;
                if(name && val) set(ref(db, `promocodes/${name}`), { value: val });
            };
            
            onValue(ref(db, 'promocodes'), s => {
                const list = document.getElementById('promo-list');
                list.innerHTML = "";
                s.forEach(c => {
                    list.innerHTML += `<div style="background:#000; padding:10px; border-radius:10px; margin-bottom:5px; display:flex; justify-content:space-between;">
                        <span>${c.key} (-${c.val().value} AZN)</span>
                        <button onclick="window.delPromo('${c.key}')" style="color:red; background:none; border:none; cursor:pointer;">SİL</button>
                    </div>`;
                });
            });

            // Blacklist
            document.getElementById('btn-add-bl').onclick = () => {
                const v = document.getElementById('bl-input').value;
                if(v) push(ref(db, 'blacklist'), { target: v });
            };
            onValue(ref(db, 'blacklist'), s => {
                const list = document.getElementById('bl-list');
                list.innerHTML = "";
                s.forEach(c => {
                    list.innerHTML += `<div style="background:#000; padding:10px; border-radius:10px; margin-bottom:5px; display:flex; justify-content:space-between;">
                        <span>${c.val().target}</span>
                        <button onclick="window.delBL('${c.key}')" style="color:red; background:none; border:none; cursor:pointer;">SİL</button>
                    </div>`;
                });
            });

            // Logs
            if(isOwner) {
                onValue(ref(db, 'logs'), s => {
                    const term = document.getElementById('log-terminal');
                    term.innerHTML = "";
                    s.forEach(c => {
                        const l = c.val();
                        term.innerHTML += `<div style="margin-bottom:4px;">> [${l.time}] ${l.user}: ${l.action}</div>`;
                    });
                    term.scrollTop = term.scrollHeight;
                });
            }

            loadStats();
            initChart();
        }

        window.delPromo = (key) => remove(ref(db, `promocodes/${key}`));
        window.delBL = (key) => remove(ref(db, `blacklist/${key}`));

        function writeLog(email, action) {
            push(ref(db, 'logs'), { user: email, action: action, time: new Date().toLocaleString() });
        }

        function loadStats() {
            onValue(ref(db, 'logs'), s => document.getElementById('stat-logs').innerText = s.size || 0);
            onValue(ref(db, 'blacklist'), s => document.getElementById('stat-bl').innerText = s.size || 0);
        }

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());

        // Nav Logic
        document.querySelectorAll('.nav-link').forEach(link => {
            link.onclick = () => {
                document.querySelectorAll('.nav-link, .view').forEach(el => el.classList.remove('active'));
                link.classList.add('active');
                document.getElementById(link.dataset.target).classList.add('active');
            };
        });

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['00:00', '08:00', '16:00', '24:00'],
                    datasets: [{ label: 'Trafik', data: [2, 10, 5, 18], borderColor: '#00f2ff', tension: 0.4 }]
                },
                options: { plugins: { legend: false }, scales: { y: { display: false } } }
            });
        }
    </script>
</body>
</html>
