<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">Glidox Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-ultra: #020204; --bg-panel: #0a0a0f; --primary: #00f2ff;
            --owner-gold: #ffaa00; --danger: #ff3e3e; --border: rgba(255, 255, 255, 0.05);
            --sidebar-w: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-ultra); color: #888b94; font-family: 'Outfit', sans-serif; height: 100vh; overflow: hidden; display: flex; }

        #gatekeeper { position: fixed; inset: 0; z-index: 10000; background: #020204; display: flex; align-items: center; justify-content: center; }
        .login-frame { background: var(--bg-panel); border: 1px solid var(--border); padding: 40px; border-radius: 30px; width: 380px; text-align: center; }
        .f-group input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; margin-top: 10px; outline: none; }

        #titan-root { display: none; width: 100%; height: 100%; }
        aside { width: var(--sidebar-w); background: var(--bg-panel); border-right: 1px solid var(--border); padding: 30px 15px; display: flex; flex-direction: column; }
        main { flex: 1; overflow-y: auto; padding: 30px; }

        .nav-link { padding: 14px 20px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; margin-bottom: 5px; transition: 0.2s; }
        .nav-link:hover { background: rgba(0, 242, 255, 0.05); }
        .nav-link.active { background: var(--primary); color: #000; }
        
        .glass-panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 25px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none; }

        .list-item { background: rgba(255,255,255,0.02); padding: 12px 20px; border-radius: 15px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        .price-box { background: rgba(255,255,255,0.02); padding: 10px; border-radius: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
        .p-key { flex: 2; color: var(--primary); font-weight: bold; background: #111 !important; }
        .p-val { flex: 1; text-align: center; }
        
        .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; padding: 5px 10px; font-size: 1.2rem; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: #000; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { opacity: 0.85; transform: translateY(-1px); }

        .view { display: none; } .view.active { display: block; }
        #btn-logout { margin-top: auto; color: var(--danger); background: none; border: 1px solid var(--danger); padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="login-frame">
            <h2 id="login-header" style="color:#fff; font-weight:900; margin-bottom: 20px;">GLIDOX LOGIN</h2>
            <div class="f-group">
                <input type="email" id="f-email" placeholder="Admin Email">
                <input type="password" id="f-pass" placeholder="Şifrə">
            </div>
            <button class="btn-main" id="btn-login-trigger" style="margin-top:20px;">SİSTEMƏ GİRİŞ</button>
            <p id="auth-err" style="color:var(--danger); font-size:11px; margin-top:10px;"></p>
        </div>
    </div>

    <div id="titan-root">
        <aside>
            <h3 style="color:#fff; margin-bottom:30px;"><i class="fa-solid fa-bolt" style="color:var(--primary)"></i> GLIDOX</h3>
            <div class="nav-link active" data-target="pg-dash"><i class="fa-solid fa-house"></i> Dashboard</div>
            <div class="nav-link" data-target="pg-prices"><i class="fa-solid fa-tags"></i> Qiymətlər</div>
            <div class="nav-link" data-target="pg-ann"><i class="fa-solid fa-bullhorn"></i> Duyurular</div>
            <div class="nav-link" data-target="pg-blist"><i class="fa-solid fa-user-slash"></i> Blacklist</div>
            
            <div id="owner-only-nav" style="display:none;">
                <div class="nav-link" data-target="pg-logs" style="color:var(--owner-gold)"><i class="fa-solid fa-database"></i> Sistem Loqları</div>
            </div>
            
            <button id="btn-logout">ÇIXIŞ ET</button>
        </aside>

        <main>
            <div id="pg-dash" class="view active">
                <div class="glass-panel">
                    <h2 id="panel-welcome-title" style="color:#fff;">Yüklənir...</h2>
                    <p id="role-text" style="color:var(--primary); font-weight:900; margin-top: 10px;"></p>
                </div>
            </div>

            <div id="pg-prices" class="view">
                <div class="glass-panel">
                    <h3>Qiymət Redaktoru</h3>
                    <select id="game-select">
                        <option value="">Oyun seçin...</option>
                        <option value="roblox">1. Roblox</option>
                        <option value="pubg">2. PUBG Mobile</option>
                        <option value="steambalans">3. Steam Balans</option>
                        <option value="mlbb">4. Mobile Legends</option>
                        <option value="valorant">5. Valorant</option>
                        <option value="freefire">6. Free Fire</option>
                        <option value="brawlstars">7. Brawl Stars</option>
                        <option value="clashofclans">8. Clash of Clans</option>
                        <option value="genshin">9. Genshin Impact</option>
                        <option value="efootball">10. eFootball PES</option>
                        <option value="codm">11. COD Mobile</option>
                        <option value="leagueoflegends">12. League of Legends</option>
                    </select>
                    
                    <div id="price-fields-container"></div>
                    
                    <div id="new-package-area" style="display:none; margin-top:20px; border-top:1px solid var(--border); padding-top:20px;">
                        <p style="font-size:12px; margin-bottom:10px; color:var(--primary)">+ YENİ PAKET ƏLAVƏ ET</p>
                        <div class="price-box" style="border: 1px solid var(--primary);">
                            <input type="text" id="new-p-key" placeholder="Paket adı (məs: 8100_UC)">
                            <input type="text" id="new-p-val" placeholder="Qiymət">
                        </div>
                    </div>
                    <button class="btn-main" id="btn-save-prices" style="display:none; margin-top:20px;">YADDA SAXLA</button>
                </div>
            </div>

            <div id="pg-ann" class="view">
                <div class="glass-panel">
                    <h3>Duyuru Sistemi</h3>
                    <textarea id="ann-text" rows="5" placeholder="Saytda görünəcək mesaj..."></textarea>
                    <button class="btn-main" id="btn-save-ann">YAYIMLA</button>
                </div>
            </div>

            <div id="pg-blist" class="view">
                <div class="glass-panel">
                    <h3>Blacklist (Qara Siyahı)</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <input type="text" id="bl-user-input" placeholder="İstifadəçi ID və ya Email" style="margin-bottom: 0;">
                        <button class="btn-main" id="btn-add-bl" style="width: 150px; padding: 0;">BLOKLA</button>
                    </div>
                    <div id="bl-list-container"></div>
                </div>
            </div>

            <div id="pg-logs" class="view">
                <div class="glass-panel">
                    <h3>Sistem Loqları</h3>
                    <div id="logs-container" style="max-height: 450px; overflow-y: auto; font-size: 13px; margin-top: 15px; border: 1px solid var(--border); padding: 10px; border-radius: 10px;"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8",
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const OWNER_UID = "dXDTZPPuVKaO1ecsO7UbCOXr15i1";
        const ADMINS = ["tMaqCC1AdoWUYgGTuay2eFKYMOF2", "NaH17on6YEO3bJzWXY16SZ02xtJ2", "Yr5c1JF2Z3T3amIoV3OJanFnFCR2"];

        setPersistence(auth, browserSessionPersistence);

        document.getElementById('btn-login-trigger').onclick = () => {
            const email = document.getElementById('f-email').value;
            const pass = document.getElementById('f-pass').value;
            signInWithEmailAndPassword(auth, email, pass).catch(() => {
                document.getElementById('auth-err').innerText = "Giriş rədd edildi!";
            });
        };

        onAuthStateChanged(auth, (user) => {
            if(user && (user.uid === OWNER_UID || ADMINS.includes(user.uid))) {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('titan-root').style.display = 'flex';
                const isOwner = user.uid === OWNER_UID;
                
                // Dinamik Başlıqların Təyini
                const titleTag = document.getElementById('dynamic-title');
                const welcomeTitle = document.getElementById('panel-welcome-title');
                const roleText = document.getElementById('role-text');

                if(isOwner) {
                    titleTag.innerText = "Glidox Owner Panel";
                    welcomeTitle.innerText = "Glidox Owner Panel";
                    roleText.innerText = "YETKİ: OWNER";
                    roleText.style.color = "var(--owner-gold)";
                    document.getElementById('owner-only-nav').style.display = 'block';
                } else {
                    titleTag.innerText = "Glidox Admins Panel v3";
                    welcomeTitle.innerText = "Glidox Admins Panel v3";
                    roleText.innerText = "YETKİ: ADMİN";
                }

                initDashboard(user, isOwner);
            } else if(user) { signOut(auth); }
        });

        function initDashboard(user, isOwner) {
            const priceContainer = document.getElementById('price-fields-container');
            const blContainer = document.getElementById('bl-list-container');

            // --- QİYMƏTLƏR ---
            document.getElementById('game-select').onchange = async (e) => {
                const game = e.target.value;
                if(!game) { priceContainer.innerHTML = ""; document.getElementById('btn-save-prices').style.display="none"; document.getElementById('new-package-area').style.display="none"; return; }
                
                document.getElementById('btn-save-prices').style.display = "block";
                document.getElementById('new-package-area').style.display = "block";
                priceContainer.innerHTML = "Yüklənir...";

                onValue(ref(db, `prices/${game}`), (snap) => {
                    const data = snap.val();
                    priceContainer.innerHTML = "";
                    if(data) {
                        Object.keys(data).sort().forEach(key => {
                            const div = document.createElement('div');
                            div.className = 'price-box';
                            div.innerHTML = `<input type="text" class="p-key" value="${key}" readonly><input type="text" class="p-val" value="${data[key]}"><button class="btn-del">×</button>`;
                            div.querySelector('.btn-del').onclick = () => div.remove();
                            priceContainer.appendChild(div);
                        });
                    }
                }, {onlyOnce: true});
            };

            document.getElementById('btn-save-prices').onclick = async () => {
                const game = document.getElementById('game-select').value;
                const rows = priceContainer.querySelectorAll('.price-box');
                const newK = document.getElementById('new-p-key').value.trim();
                const newV = document.getElementById('new-p-val').value.trim();
                let upData = {};
                rows.forEach(r => {
                    const k = r.querySelector('.p-key').value;
                    const v = r.querySelector('.p-val').value;
                    upData[k] = isNaN(v) ? v : Number(v);
                });
                if(newK && newV) upData[newK] = isNaN(newV) ? newV : Number(newV);
                await set(ref(db, `prices/${game}`), upData);
                alert("Yeniləndi!");
                document.getElementById('new-p-key').value = ""; document.getElementById('new-p-val').value = "";
                document.getElementById('game-select').dispatchEvent(new Event('change'));
            };

            // --- BLACKLIST ---
            document.getElementById('btn-add-bl').onclick = () => {
                const val = document.getElementById('bl-user-input').value.trim();
                if(!val) return;
                set(ref(db, `blacklist/${val.replace(/\./g, '_')}`), { status: "banned", by: user.email, date: new Date().toLocaleDateString() })
                .then(() => { alert("Bloklandı!"); document.getElementById('bl-user-input').value = ""; });
            };

            onValue(ref(db, 'blacklist'), (snap) => {
                blContainer.innerHTML = "";
                snap.forEach(child => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.innerHTML = `<span><i class="fa-solid fa-user-lock"></i> ${child.key}</span> <button class="btn-del">SİL</button>`;
                    div.querySelector('.btn-del').onclick = () => { if(confirm("Blokdan çıxarılsın?")) remove(ref(db, `blacklist/${child.key}`)); };
                    blContainer.appendChild(div);
                });
            });

            // --- ANNOUNCEMENT ---
            document.getElementById('btn-save-ann').onclick = () => {
                update(ref(db, 'announcement'), { message: document.getElementById('ann-text').value, date: new Date().toLocaleString() })
                .then(() => alert("Yayına verildi!"));
            };

            // --- LOGS (OWNER ONLY) ---
            if(isOwner) {
                onValue(ref(db, 'logs'), (snap) => {
                    const lBox = document.getElementById('logs-container');
                    lBox.innerHTML = "";
                    snap.forEach(child => {
                        const l = child.val();
                        lBox.innerHTML = `<div style="padding:5px; border-bottom:1px solid #111;">[${l.time}] <b>${l.user}</b>: ${l.action}</div>` + lBox.innerHTML;
                    });
                });
            }
        }

        document.getElementById('btn-logout').onclick = () => signOut(auth).then(() => location.reload());
        document.querySelectorAll('.nav-link').forEach(l => {
            l.onclick = () => {
                document.querySelectorAll('.nav-link, .view').forEach(el => el.classList.remove('active'));
                l.classList.add('active');
                document.getElementById(l.dataset.target).classList.add('active');
            };
        });
    </script>
</body>
</html>
