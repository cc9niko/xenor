<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox Fix v9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff4655; --bg: #000; --c: #0d0d0d; --t: #fff; --g: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #080808; padding: 35px; border: 1px solid #1a1a1a; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        
        /* Header & Nav */
        header { padding: 15px 20px; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; background: #050505; }
        nav { display: flex; overflow-x: auto; border-bottom: 1px solid #111; background: #050505; scrollbar-width: none; flex-shrink: 0; }
        .nav-link { padding: 15px 20px; color: #555; font-size: 10px; font-weight: 600; text-transform: uppercase; white-space: nowrap; border-bottom: 2px solid transparent; }
        .nav-link.active { color: var(--p); border-bottom-color: var(--p); background: rgba(255, 70, 85, 0.05); }

        /* Content */
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .section { display: none; max-width: 1000px; margin: 0 auto; }
        .section.active { display: block; }

        /* Mobile Cards */
        .card { background: var(--c); border: 1px solid #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
        
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 14px; color: #fff; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 10px; }
        .btn { background: var(--p); color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-family: 'Orbitron'; font-size: 11px; cursor: pointer; width: 100%; }
        
        /* Logs Fix */
        .log-box { background: #000; border: 1px solid #111; border-radius: 10px; height: 350px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 11px; }
        .log-item { border-bottom: 1px solid #080808; padding: 8px 0; color: var(--g); }
        .log-item b { color: var(--p); }

        @media (max-width: 768px) {
            nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; border-top: 1px solid #111; border-bottom: none; }
            .nav-link { flex: 1; text-align: center; font-size: 8px; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family:'Orbitron'; color:var(--p); margin-bottom:20px;">GLIDOX CORE</h2>
            <input type="text" id="adm-u" placeholder="Adınız">
            <input type="password" id="adm-p" placeholder="Məxfi Şifrə">
            <button class="btn" onclick="startSession()">GİRİŞ ET</button>
        </div>
    </div>

    <header>
        <div style="font-family:'Orbitron'; font-size:12px; color:var(--p);">V9.0 FIX</div>
        <div id="user-info" style="font-size:10px; color:#555;">...</div>
    </header>

    <nav>
        <div class="nav-link active" onclick="tab('dash', event)">Dash</div>
        <div class="nav-link" onclick="tab('prices', event)">Qiymət</div>
        <div class="nav-link" onclick="tab('promo', event)">Promo</div>
        <div class="nav-link" onclick="tab('ann', event)">Duyuru</div>
        <div class="nav-link" onclick="tab('logs', event)">Loqlar</div>
    </nav>

    <main>
        <section id="dash" class="section active">
            <div class="card"><h3>Xoş gəldin, <span id="u-name" style="color:var(--p)">Admin</span></h3></div>
            <div class="card" style="border-left: 4px solid var(--g);">
                <label style="font-size:10px; color:#444;">SİSTEM STATUSU</label>
                <div style="color:var(--g); font-weight:bold;">MODERN V9 | AKTİV</div>
            </div>
        </section>

        <section id="prices" class="section">
            <select id="game-sel" onchange="fetchPrices(this.value)" style="border-color:var(--p)"></select>
            <div id="price-list" class="grid"></div>
        </section>

        <section id="promo" class="section">
            <div class="card">
                <input type="text" id="pc" placeholder="Kod">
                <input type="number" id="pp" placeholder="%">
                <button class="btn" onclick="addPromo()">ƏLAVƏ ET</button>
            </div>
            <div id="promo-list" class="grid"></div>
        </section>

        <section id="ann" class="section">
            <div class="card">
                <textarea id="am" rows="4" placeholder="Mesaj..."></textarea>
                <select id="as"><option value="active">AKTİV</option><option value="inactive">DEAKTİV</option></select>
                <button class="btn" onclick="upAnn()">YENİLƏ</button>
            </div>
        </section>

        <section id="logs" class="section">
            <div class="log-box" id="lc">Yüklənir...</div>
            <button class="btn" style="margin-top:10px; background:#111;" onclick="clearLc()">TƏMİZLƏ</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const cfg = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(cfg);
        const db = getDatabase(app);
        let session = { u: "", p: "" };
        const gl = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        window.startSession = async () => {
            const u = document.getElementById('adm-u').value;
            const p = document.getElementById('adm-p').value;
            try {
                // Təhlükəsizlik testi
                await get(ref(db, 'prices/roblox'));
                session.u = u; session.p = p;
                document.getElementById('auth-screen').remove();
                document.getElementById('u-name').innerText = u;
                document.getElementById('user-info').innerText = u.toUpperCase();
                init();
                track("Sistemə giriş etdi");
            } catch (e) { alert("Xəta: Giriş rədd edildi!"); }
        };

        function track(a) {
            push(ref(db, 'logs'), { u: session.u, a: a, t: new Date().toLocaleString('az-AZ'), auth: session.p });
        }

        function init() {
            const sel = document.getElementById('game-sel');
            sel.innerHTML = gl.map(g => `<option value="${g}">${g.toUpperCase()}</option>`).join('');
            fetchPrices(gl[0]);

            onValue(ref(db, 'promocodes'), s => {
                const l = document.getElementById('promo-list'); l.innerHTML = "";
                s.forEach(i => {
                    l.innerHTML += `<div class="card" style="display:flex; justify-content:space-between;"><b>${i.key}</b> <span>${i.val().percent}% <button onclick="del('promocodes/${i.key}')" style="color:red; background:none; border:none; margin-left:10px;">X</button></span></div>`;
                });
            });

            onValue(ref(db, 'logs'), s => {
                const c = document.getElementById('lc'); c.innerHTML = "";
                let logs = [];
                s.forEach(i => { if(i.val().u) logs.push(i.val()); });
                logs.reverse().slice(0, 50).forEach(d => {
                    c.innerHTML += `<div class="log-item">[${d.t}] <b>${d.u}</b>: ${d.a}</div>`;
                });
            });
        }

        window.fetchPrices = (g) => {
            onValue(ref(db, `prices/${g}`), s => {
                const l = document.getElementById('price-list'); l.innerHTML = "";
                const data = s.val() || {};
                Object.keys(data).forEach(k => {
                    if(k === 'auth' || k.includes('test')) return;
                    const v = (typeof data[k] === 'object') ? data[k].val : data[k];
                    l.innerHTML += `<div class="card"><label>${k}</label><input type="text" id="i-${g}-${k}" value="${v}"><button class="btn" style="padding:8px" onclick="upP('${g}','${k}')">SAVE</button></div>`;
                });
            });
        };

        window.upP = (g, k) => {
            const v = document.getElementById(`i-${g}-${k}`).value;
            set(ref(db, `prices/${g}/${k}`), { val: v, auth: session.p }).then(() => {
                track(`${g}/${k} qiymətini ${v} etdi`); alert("OK");
            }).catch(() => alert("İcazə yoxdur!"));
        };

        window.addPromo = () => {
            const c = document.getElementById('pc').value, p = document.getElementById('pp').value;
            set(ref(db, `promocodes/${c}`), { percent: p, auth: session.p }).then(() => track(`Promo: ${c}`));
        };

        window.upAnn = () => {
            const m = document.getElementById('am').value, s = document.getElementById('as').value;
            set(ref(db, 'announcement'), { msg: m, stat: s, auth: session.p }).then(() => { track("Duyuru yeniləndi"); alert("OK"); });
        };

        window.del = (p) => { if(confirm("Silinsin?")) remove(ref(db, p)); };
        window.clearLc = () => { if(confirm("Loqlar silinsin?")) set(ref(db, 'logs'), { auth: session.p }); };

        window.tab = (id, e) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.target.classList.add('active');
        };
    </script>
</body>
</html>
