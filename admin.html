<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Glidox Enterprise v14</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffb300; --blue: #0084ff; --bg: #050505; --card: #0f0f0f; --text: #eee; --border: rgba(255,255,255,0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Themes */
        body.owner-mode { --accent: var(--gold); }
        body.admin-mode { --accent: var(--blue); }

        /* Auth */
        #auth-layer { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: #0a0a0a; padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .login-box h2 { font-family: 'Orbitron'; margin-bottom: 25px; letter-spacing: 2px; }

        /* Header & Nav */
        header { padding: 18px 20px; background: #080808; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--accent); font-size: 14px; text-shadow: 0 0 10px var(--accent); }
        
        nav { display: flex; background: #080808; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
        .nav-btn { padding: 16px 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; color: #555; cursor: pointer; white-space: nowrap; transition: 0.3s; border-bottom: 2px solid transparent; }
        .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(255,255,255,0.02); }

        /* Main Content */
        main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 90px; }
        .page { display: none; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 18px; margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #444; text-transform: uppercase; margin-bottom: 8px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 14px; color: #fff; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 10px; }
        
        .btn { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; width: 100%; font-size: 11px; }
        .admin-mode .btn { color: #fff; }

        /* Lists */
        .item-list { display: grid; gap: 10px; }
        .list-card { background: #080808; padding: 12px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #111; }
        .del-btn { color: #ff4655; background: none; border: none; cursor: pointer; font-weight: bold; }

        /* Logs Output */
        #log-out { height: 400px; overflow-y: auto; background: #000; padding: 15px; border-radius: 12px; font-family: monospace; font-size: 11px; color: #0f8; line-height: 1.6; }
        .log-entry { border-bottom: 1px solid #080808; padding: 5px 0; }
        .log-entry b { color: var(--accent); }

        .owner-only { display: none; }

        @media (max-width: 768px) {
            nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; border-top: 1px solid var(--border); }
            .nav-btn { flex: 1; text-align: center; font-size: 8px; padding: 18px 5px; }
        }
    </style>
</head>
<body class="admin-mode">

    <div id="auth-layer">
        <div class="login-box">
            <h2 id="login-title">GLIDOX ENTERPRISE</h2>
            <input type="text" id="login-name" placeholder="Adınız">
            <input type="password" id="login-pass" placeholder="Şifrə">
            <button class="btn" onclick="handleLogin()">GİRİŞ ET</button>
        </div>
    </div>

    <header>
        <div class="logo" id="panel-name">GLIDOX ADMIN 2.5</div>
        <div id="badge" style="font-size:9px; background:#111; padding:4px 10px; border-radius:5px;">OFLINE</div>
    </header>

    <nav>
        <div class="nav-btn active" onclick="tab('dash', event)">Dash</div>
        <div class="nav-btn" onclick="tab('prices', event)">Qiymətlər</div>
        <div class="nav-btn" onclick="tab('promo', event)">Promo</div>
        <div class="nav-btn" onclick="tab('ann', event)">Duyuru</div>
        <div class="nav-btn owner-only" onclick="tab('bl', event)">Blacklist</div>
        <div class="nav-btn owner-only" onclick="tab('logs', event)">Loqlar</div>
    </nav>

    <main>
        <section id="dash" class="page active">
            <div class="card"><h3>Xoş gəldin, <span id="u-display" style="color:var(--accent)">...</span></h3></div>
            <div class="card"><label>Sistem Statusu</label><p id="sys-time" style="color:#0f8; font-weight:bold;">AKTİV</p></div>
        </section>

        <section id="prices" class="page">
            <div class="card"><select id="game-sel" onchange="loadPrices(this.value)"></select></div>
            <div id="price-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap:12px;"></div>
        </section>

        <section id="promo" class="page">
            <div class="card">
                <input type="text" id="pc" placeholder="KOD">
                <input type="number" id="pv" placeholder="FAİZ %">
                <button class="btn" onclick="addPromo()">YARAT</button>
            </div>
            <div id="promo-list" class="item-list"></div>
        </section>

        <section id="ann" class="page">
            <div class="card">
                <label>Duyuru Mətni</label>
                <textarea id="at" rows="5" placeholder="Saytın başında çıxan mesaj..."></textarea>
                <button class="btn" onclick="setAnn()">GÖNDƏR</button>
            </div>
        </section>

        <section id="bl" class="page">
            <div class="card">
                <input type="text" id="bl-ip" placeholder="IP və ya ID">
                <button class="btn" style="background:#ff4655; color:#fff;" onclick="addBL()">BLOKLA</button>
            </div>
            <div id="bl-list" class="item-list"></div>
        </section>

        <section id="logs" class="page">
            <div id="log-out">Yüklənir...</div>
            <button class="btn" style="margin-top:10px; background:#111; color:#555;" onclick="clearLogs()">TƏMİZLƏ</button>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = {
            apiKey: "IzaSyCGsCjbwh6P7fHepdHrSyykpSAEmg0RmO8", 
            databaseURL: "https://glidoxshop-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "glidoxshop"
        };

        const app = initializeApp(config);
        const db = getDatabase(app);
        let session = { u: "", p: "", r: "" };
        const games = ["roblox", "pubg", "mlbb", "valorantTR", "valorantEU", "steambalans", "applebalans", "freefire", "discord", "weplay", "standoff", "deltaforce"];

        window.handleLogin = async () => {
            const u = document.getElementById('login-name').value;
            const p = document.getElementById('login-pass').value;
            try {
                const snap = await get(ref(db, 'security'));
                const data = snap.val();
                
                if(p === data.owner_pass) session.r = "owner";
                else if(p === data.admin_pass) session.r = "admin";
                else return alert("Şifrə səhvdir!");

                session.u = u; session.p = p;
                initUI();
                logAction("Panelə daxil oldu");
            } catch (e) { alert("Xəta!"); }
        };

        function initUI() {
            document.getElementById('auth-layer').remove();
            document.body.className = `${session.r}-mode`;
            document.getElementById('u-display').innerText = session.u;
            document.getElementById('badge').innerText = session.r.toUpperCase();
            
            if(session.r === 'owner') {
                document.getElementById('panel-name').innerText = "GLIDOX OWNER CENTRAL";
                document.querySelectorAll('.owner-only').forEach(e => e.style.display = 'block');
            } else {
                document.getElementById('panel-name').innerText = "GLIDOX ADMIN 2.5";
            }

            const sel = document.getElementById('game-sel');
            sel.innerHTML = games.map(g => `<option value="${g}">${g.toUpperCase()}</option>`).join('');
            loadPrices(games[0]);
            syncData();
        }

        function logAction(act) {
            push(ref(db, 'logs'), { u: session.u, a: act, t: new Date().toLocaleString('az-AZ'), r: session.r });
        }

        function syncData() {
            // Promos
            onValue(ref(db, 'promocodes'), s => {
                const l = document.getElementById('promo-list'); l.innerHTML = "";
                s.forEach(c => {
                    l.innerHTML += `<div class="list-card"><b>${c.key}</b> <span>${c.val().percent}% <button class="del-btn" onclick="delItem('promocodes/${c.key}')">X</button></span></div>`;
                });
            });

            // Blacklist
            onValue(ref(db, 'blacklist'), s => {
                const l = document.getElementById('bl-list'); l.innerHTML = "";
                s.forEach(c => {
                    l.innerHTML += `<div class="list-card"><span>${c.val().ip}</span> <button class="del-btn" onclick="delItem('blacklist/${c.key}')">SİL</button></div>`;
                });
            });

            // Logs
            onValue(ref(db, 'logs'), s => {
                const out = document.getElementById('log-out'); out.innerHTML = "";
                let arr = []; s.forEach(c => { if(c.val().u) arr.push(c.val()); });
                arr.reverse().slice(0, 100).forEach(i => {
                    out.innerHTML += `<div class="log-entry"><span>[${i.t}]</span> <b>${i.u}</b>: ${i.a}</div>`;
                });
            });
        }

        window.loadPrices = (g) => {
            onValue(ref(db, `prices/${g}`), s => {
                const grid = document.getElementById('price-grid'); grid.innerHTML = "";
                const data = s.val() || {};
                Object.keys(data).forEach(k => {
                    if(k === 'auth') return;
                    const val = (typeof data[k] === 'object') ? data[k].val : data[k];
                    grid.innerHTML += `<div class="card"><label>${k}</label><input type="text" id="inp-${g}-${k}" value="${val}"><button class="btn" style="padding:10px;" onclick="savePrice('${g}','${k}')">SAVE</button></div>`;
                });
            });
        };

        window.savePrice = (g, k) => {
            const v = document.getElementById(`inp-${g}-${k}`).value;
            // DİQQƏT: Qiyməti təmiz rəqəm kimi yazırıq ki, 0.80 problemi olmasın
            set(ref(db, `prices/${g}/${k}`), { val: v, auth: session.p }).then(() => {
                logAction(`${g}/${k} qiyməti: ${v}`);
                alert("Dəyişdirildi!");
            });
        };

        window.addPromo = () => {
            const c = document.getElementById('pc').value, v = document.getElementById('pv').value;
            set(ref(db, `promocodes/${c}`), { percent: v, auth: session.p }).then(() => logAction(`Promo: ${c}`));
        };

        window.setAnn = () => {
            const t = document.getElementById('at').value;
            set(ref(db, 'announcement'), { msg: t, auth: session.p }).then(() => {
                logAction("Duyurunu yenilədi"); alert("OK");
            });
        };

        window.addBL = () => {
            const ip = document.getElementById('bl-ip').value;
            push(ref(db, 'blacklist'), { ip: ip, auth: session.p }).then(() => logAction(`Blacklist: ${ip}`));
        };

        window.delItem = (p) => { if(confirm("Silinsin?")) remove(ref(db, p)); };
        window.clearLogs = () => { if(confirm("Təmizlənsin?")) set(ref(db, 'logs'), { empty: true }); };

        window.tab = (id, e) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.target.classList.add('active');
        };
    </script>
</body>
</html>
